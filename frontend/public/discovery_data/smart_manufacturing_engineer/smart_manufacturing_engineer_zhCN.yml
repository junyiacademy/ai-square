# 智慧制造工程师探索路径 - 简体中文
path_id: smart_manufacturing_engineer
category: manufacturing
difficulty_range: beginner_to_expert

metadata:
  title: "工业炼金师 - 智慧制造工程师"
  short_description: "用 AI 和数据把工厂变成会自己思考的生命体"
  long_description: |
    你是「数字工厂」的见习炼金师，拥有让生产线自我进化的天赋
    在这个结合 IoT、AI、数字孪生的未来工厂中，每一个传感器的数据
    都在帮助机器自主决策，而你的使命是打造永不停机的智慧产线

  estimated_hours: 50
  skill_focus:
    - industrial_iot
    - digital_twin
    - predictive_maintenance
    - production_optimization

world_setting:
  name: "数字工厂"
  description: |
    数字工厂是一座实体与虚拟完美映射的生产基地
    每一台机器都有它的数字分身，每一个流程都被数据驱动
    富士康的关灯工厂就是这套系统的极致体现

  atmosphere: "industrial_digital"
  visual_theme: "digital_factory"

starting_scenario:
  title: "工厂的数字觉醒"
  description: |
    厂长 Forge 带你走进一座传统工厂，生产线效率低落、良率不稳
    突然一台核心设备 Breakdown 发出异常震动
    你必须用传感器数据预测它什么时候会故障

  initial_tasks:
    - learn_iot_basics
    - understand_sensors
    - first_data_collection

skill_tree:
  core_skills:
    - id: industrial_iot
      name: "工业物联网"
      description: "部署传感器网络收集生产数据"
      max_level: 10
      unlocks:
        - sensor_deployment
        - edge_computing

    - id: data_analytics
      name: "制造数据分析"
      description: "分析生产数据找出瓶颈和异常"
      max_level: 10
      unlocks:
        - spc_analysis
        - yield_optimization

    - id: automation
      name: "自动化控制"
      description: "设计 PLC 和 SCADA 自动化系统"
      max_level: 10
      unlocks:
        - plc_programming
        - scada_design

    - id: digital_twin
      name: "数字孪生"
      description: "建立生产线的虚拟复制品进行模拟"
      max_level: 10
      unlocks:
        - 3d_simulation
        - process_modeling

  advanced_skills:
    - id: predictive_maintenance
      name: "预测性维护"
      description: "用 AI 在设备故障前提前预警"
      max_level: 15
      requires: [industrial_iot, data_analytics]

    - id: ai_quality_control
      name: "AI 品质检测"
      description: "用计算机视觉自动检测产品瑕疵"
      max_level: 15
      requires: [data_analytics, automation]

    - id: lights_out_factory
      name: "关灯工厂"
      description: "设计完全无人化的自主生产系统"
      max_level: 15
      requires: [digital_twin, predictive_maintenance]

milestone_quests:
  - id: first_sensor
    name: "第一个传感器"
    description: "成功部署传感器并收集到有意义的生产数据"
    required_level: 5
    skills_tested: [industrial_iot, data_analytics]
    xp_reward: 500
    unlocks:
      - iot_badge
      - factory_floor_access

  - id: breakdown_preventer
    name: "故障先知"
    description: "在设备故障前 24 小时成功预警"
    required_level: 10
    skills_tested: [predictive_maintenance, digital_twin]
    xp_reward: 1000
    unlocks:
      - maintenance_master_title
      - control_room_access

  - id: factory_architect
    name: "智慧工厂建筑师"
    description: "设计并部署一座完整的智慧工厂"
    required_level: 20
    skills_tested: [lights_out_factory, ai_quality_control]
    xp_reward: 2500
    unlocks:
      - architect_legend_title
      - factory_leadership

achievements:
  - id: first_dashboard
    name: "第一面看板"
    description: "建立生产线实时监控仪表板"
    xp_reward: 100
    badge_type: bronze

  - id: yield_booster
    name: "良率推进者"
    description: "将产线良率从 90% 提升到 99%"
    xp_reward: 250
    badge_type: silver

  - id: zero_downtime
    name: "零停机纪录"
    description: "连续 90 天产线零非计划停机"
    xp_reward: 500
    badge_type: gold

  - id: factory_legend
    name: "工厂传奇"
    description: "完成所有智慧制造挑战"
    xp_reward: 1000
    badge_type: platinum

example_tasks:
  beginner:
    - id: sensor_setup
      type: interaction
      title: "传感器布建"
      description: "在一台 CNC 车床上安装震动和温度传感器"
      skills_improved: [industrial_iot]
      xp_reward: 60

    - id: production_analysis
      type: analysis
      title: "产线数据分析"
      description: "分析一周的生产数据找出效率瓶颈"
      skills_improved: [data_analytics]
      xp_reward: 50

  intermediate:
    - id: twin_creation
      type: creation
      title: "数字孪生建模"
      description: "为一条 SMT 产线建立数字孪生模型"
      skills_improved: [digital_twin, data_analytics]
      xp_reward: 180

    - id: aoi_system
      type: creation
      title: "AI 视觉检测系统"
      description: "训练模型自动检测 PCB 板上的焊接瑕疵"
      skills_improved: [ai_quality_control, automation]
      xp_reward: 200

  advanced:
    - id: predictive_system
      type: creation
      title: "预测维护系统"
      description: "建立整厂设备的健康度评分与故障预测系统"
      skills_improved: [predictive_maintenance, industrial_iot]
      xp_reward: 350

    - id: autonomous_factory
      type: creation
      title: "自主工厂设计"
      description: "设计一座从排程到品检全自动的关灯工厂"
      skills_improved: [lights_out_factory, digital_twin]
      xp_reward: 400

learning_objectives:
  - "理解工业物联网的架构与传感器技术"
  - "掌握制造数据的收集与分析方法"
  - "设计 PLC 和 SCADA 自动化系统"
  - "建立生产线的数字孪生模型"
  - "运用 AI 进行预测性维护"
  - "实作计算机视觉品质检测"
  - "设计无人化关灯工厂"
  - "了解智慧制造与工业 4.0 发展"

career_outcomes:
  - "智慧制造工程师"
  - "工业物联网架构师"
  - "数字孪生工程师"
  - "制造数据科学家"
  - "自动化系统集成工程师"
  - "预测维护工程师"
  - "AI 品质工程师"
  - "智慧工厂顾问"
