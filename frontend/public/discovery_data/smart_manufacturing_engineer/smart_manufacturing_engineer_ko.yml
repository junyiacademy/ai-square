# Smart Manufacturing Engineer Discovery Path - Korean
path_id: smart_manufacturing_engineer
category: technology
difficulty_range: beginner_to_expert

metadata:
  title: "디지털 팩토리 커맨더 - 스마트 팩토리 운영 매니저"
  short_description: "기존 공장을 지능형 무인 생산 시스템으로 변혁한다"
  long_description: |
    당신은 「디지털 팩토리」의 신입 엔지니어입니다. 이곳에서 기계들은 서로 소통하고, 로봇은 사람의 개입 없이 밤새 작동하며, 인공지능은 결함이 발생하기 전에 예측합니다. 폭스콘의 등화관제 자동화에서 영감을 받은 이 미래형 공장에서 센서, 데이터, 스마트 알고리즘이 어떻게 결합되어 스스로 운영되는 공장을 만드는지 배웁니다. 제조업은 재창조되고 있으며, 당신이 그 혁명을 이끌게 됩니다.

  estimated_hours: 55
  skill_focus:
    - iot_sensors
    - digital_twin
    - ai_quality_control
    - predictive_maintenance

world_setting:
  name: "디지털 팩토리"
  description: |
    디지털 팩토리는 모든 기계가 연결되고, 모든 공정이 실시간으로 모니터링되며, AI가 인간보다 빠르게 의사결정을 내리는 최첨단 시설입니다. 이곳 엔지니어들은 로봇과 인간이 협력하는 시스템을 설계하고, 디지털 트윈이 전체 생산 라인을 시뮬레이션하며, 예측 시스템이 문제가 발생하기 전에 방지합니다. 이것이 미래의 공장입니다.

  atmosphere: "futuristic_precision"
  visual_theme: "digital_factory_neon"

starting_scenario:
  title: "공장의 각성"
  description: |
    공장장 Titan이 대담한 임무를 발표합니다: 1년 안에 구형 조립 라인을 완전 자동화 스마트 공장으로 변혁하는 것입니다. 경쟁사들은 이미 AI 로봇과 실시간 품질 관리를 사용하고 있습니다. 센서로 기계를 연결하고, 생산 라인의 디지털 트윈을 구축하며, 데이터를 사용해 낭비와 결함을 제거하는 방법을 배워야 합니다. 제조의 미래는 지금 시작됩니다.

  initial_tasks:
    - connect_first_sensor
    - study_production_data
    - map_factory_processes

skill_tree:
  core_skills:
    - id: iot_sensors
      name: "IoT 센서 네트워크"
      description: "실시간 생산 데이터를 수집하는 센서로 기계와 장비를 연결한다"
      max_level: 10
      unlocks:
        - network_protocols
        - data_pipelines

    - id: digital_twin
      name: "디지털 트윈 시스템"
      description: "테스트와 최적화를 위해 실세계 조건을 반영하는 공장의 가상 복사본을 만든다"
      max_level: 10
      unlocks:
        - simulation_modeling
        - virtual_commissioning

    - id: ai_quality_control
      name: "AI 품질 관리"
      description: "컴퓨터 비전과 머신러닝으로 제품 결함을 자동 감지한다"
      max_level: 10
      unlocks:
        - vision_systems
        - defect_classification

    - id: predictive_maintenance
      name: "예측 정비"
      description: "장비 고장이 생산 중단을 유발하기 전에 예측하기 위해 기계 데이터를 분석한다"
      max_level: 10
      unlocks:
        - anomaly_detection
        - maintenance_scheduling

  advanced_skills:
    - id: robotic_automation
      name: "로봇 자동화"
      description: "복잡한 조립과 자재 취급 작업을 수행하는 로봇 시스템을 설계하고 프로그래밍한다"
      max_level: 15
      requires: [iot_sensors, digital_twin]

    - id: supply_chain_intelligence
      name: "공급망 지능화"
      description: "AI 공급망 관리를 사용해 자재와 부품의 흐름을 최적화한다"
      max_level: 15
      requires: [iot_sensors, ai_quality_control]

    - id: lights_out_manufacturing
      name: "등화관제 제조"
      description: "사람의 개입 없이 24/7 운영할 수 있는 완전 자동화 생산 시스템을 설계한다"
      max_level: 15
      requires: [robotic_automation, predictive_maintenance]

milestone_quests:
  - id: first_connected_line
    name: "첫 번째 연결된 라인"
    description: "IoT 센서로 전체 생산 라인을 연결하고 실시간 데이터를 표시하는 데 성공한다"
    required_level: 5
    skills_tested: [iot_sensors, digital_twin]
    xp_reward: 500
    unlocks:
      - connected_factory_badge
      - advanced_lab_access

  - id: zero_defect_challenge
    name: "제로 결함 챌린지"
    description: "99.9% 결함 감지 정확도를 달성하는 AI 품질 관리 시스템을 구현한다"
    required_level: 10
    skills_tested: [ai_quality_control, digital_twin]
    xp_reward: 1000
    unlocks:
      - quality_guardian_title
      - vision_lab_access

  - id: lights_out_factory
    name: "등화관제 공장"
    description: "사람의 개입 없이 72시간 지속 운영할 수 있는 생산 시스템을 설계한다"
    required_level: 20
    skills_tested: [lights_out_manufacturing, robotic_automation]
    xp_reward: 2500
    unlocks:
      - factory_commander_title
      - factory_leadership

achievements:
  - id: first_connection
    name: "첫 번째 연결"
    description: "첫 번째 기계를 IoT 네트워크에 성공적으로 연결한다"
    xp_reward: 100
    badge_type: bronze

  - id: defect_detective
    name: "결함 탐정"
    description: "AI 비전으로 100개 제품 결함을 자동 감지한다"
    xp_reward: 250
    badge_type: silver

  - id: uptime_champion
    name: "가동률 챔피언"
    description: "예측 정비 알림으로 5번의 장비 고장을 방지한다"
    xp_reward: 500
    badge_type: gold

  - id: factory_legend
    name: "팩토리 레전드"
    description: "디지털 팩토리의 모든 스마트 제조 챌린지를 완료한다"
    xp_reward: 1000
    badge_type: platinum

example_tasks:
  beginner:
    - id: sensor_setup
      type: technical
      title: "센서 네트워크 설정"
      description: "온도, 진동, 속도 센서를 시뮬레이션 생산 기계에 연결한다"
      skills_improved: [iot_sensors]
      xp_reward: 60

    - id: data_dashboard
      type: analysis
      title: "생산 데이터 대시보드"
      description: "센서 데이터에서 핵심 생산 지표를 표시하는 실시간 대시보드를 구축한다"
      skills_improved: [iot_sensors, digital_twin]
      xp_reward: 50

  intermediate:
    - id: twin_builder
      type: creation
      title: "디지털 트윈 빌더"
      description: "실제 기계 동작을 반영하는 생산 셀의 디지털 트윈을 만든다"
      skills_improved: [digital_twin, iot_sensors]
      xp_reward: 180

    - id: ai_inspector
      type: creation
      title: "AI 품질 검사관"
      description: "제조 부품의 표면 결함을 식별하는 컴퓨터 비전 모델을 훈련한다"
      skills_improved: [ai_quality_control]
      xp_reward: 200

  advanced:
    - id: predictive_system
      type: creation
      title: "예측 정비 시스템"
      description: "진동 데이터를 사용해 48시간 전에 기계 고장을 예측하는 시스템을 설계한다"
      skills_improved: [predictive_maintenance, iot_sensors]
      xp_reward: 350

    - id: autonomous_line
      type: creation
      title: "자율 생산 라인"
      description: "로봇 취급과 AI 품질 관리를 갖춘 완전 자동화 생산 순서를 설계한다"
      skills_improved: [lights_out_manufacturing, robotic_automation]
      xp_reward: 400

learning_objectives:
  - "IoT 센서가 실시간 공장 데이터를 수집하고 전송하는 방법을 이해한다"
  - "물리적 생산 시스템의 디지털 트윈 시뮬레이션을 구축하는 방법을 배운다"
  - "컴퓨터 비전과 머신러닝을 자동화 품질 검사에 적용한다"
  - "비용이 많이 드는 장비 고장을 방지하는 예측 정비 시스템을 설계한다"
  - "로봇 시스템이 유연한 제조 작업을 위해 어떻게 프로그래밍되는지 이해한다"
  - "생산 데이터를 분석해 효율성 개선과 낭비 감소 기회를 파악한다"
  - "기계가 소통하고 자가 최적화하는 상호 연결 공장 시스템을 설계한다"
  - "등화관제 제조와 완전 자율 공장의 미래를 탐구한다"

career_outcomes:
  - "스마트 팩토리 운영 매니저"
  - "산업용 IoT 엔지니어"
  - "디지털 트윈 전문가"
  - "로봇 자동화 엔지니어"
  - "AI 품질 관리 엔지니어"
  - "예측 정비 엔지니어"
  - "제조 데이터 과학자"
  - "인더스트리 4.0 컨설턴트"
