# スマート製造エンジニア探索パス - 日本語
path_id: smart_manufacturing_engineer
category: manufacturing
difficulty_range: beginner_to_expert

metadata:
  title: "産業錬金師 - スマート製造エンジニア"
  short_description: "AIとデータで工場を自ら考える生命体に変える"
  long_description: |
    あなたは「デジタル工場」の見習い錬金師です。生産ラインを自ら進化させる
    才能を持っています。IoT・AI・デジタルツインを組み合わせたこの未来工場では
    すべてのセンサーデータが機械の自律判断を助けており、あなたの使命は
    止まらないスマート生産ラインを構築することです

  estimated_hours: 50
  skill_focus:
    - industrial_iot
    - digital_twin
    - predictive_maintenance
    - production_optimization

world_setting:
  name: "デジタル工場"
  description: |
    デジタル工場は、物理とバーチャルが完璧に対応した生産拠点です
    すべての機械がデジタルツインを持ち、すべてのプロセスがデータで
    駆動されています。フォックスコンの無人工場はこのシステムの極致です

  atmosphere: "industrial_digital"
  visual_theme: "digital_factory"

starting_scenario:
  title: "工場のデジタル覚醒"
  description: |
    工場長 Forge があなたを伝統的な工場に案内します。生産ラインの効率は低く
    良品率も不安定です。突然、コア設備 Breakdown が異常な振動を発しました
    あなたはセンサーデータを使って、いつ故障するかを予測しなければなりません

  initial_tasks:
    - learn_iot_basics
    - understand_sensors
    - first_data_collection

skill_tree:
  core_skills:
    - id: industrial_iot
      name: "産業用IoT"
      description: "センサーネットワークを展開して生産データを収集する"
      max_level: 10
      unlocks:
        - sensor_deployment
        - edge_computing

    - id: data_analytics
      name: "製造データ分析"
      description: "生産データを分析してボトルネックと異常を発見する"
      max_level: 10
      unlocks:
        - spc_analysis
        - yield_optimization

    - id: automation
      name: "自動化制御"
      description: "PLCとSCADA自動化システムを設計する"
      max_level: 10
      unlocks:
        - plc_programming
        - scada_design

    - id: digital_twin
      name: "デジタルツイン"
      description: "生産ラインの仮想複製品を構築してシミュレーションを行う"
      max_level: 10
      unlocks:
        - 3d_simulation
        - process_modeling

  advanced_skills:
    - id: predictive_maintenance
      name: "予知保全"
      description: "AIを使って設備故障前に早期警告を行う"
      max_level: 15
      requires: [industrial_iot, data_analytics]

    - id: ai_quality_control
      name: "AI品質検査"
      description: "コンピュータビジョンで製品の欠陥を自動検出する"
      max_level: 15
      requires: [data_analytics, automation]

    - id: lights_out_factory
      name: "無人工場"
      description: "完全無人化の自律生産システムを設計する"
      max_level: 15
      requires: [digital_twin, predictive_maintenance]

milestone_quests:
  - id: first_sensor
    name: "最初のセンサー"
    description: "センサーを正常に展開し、意味のある生産データを収集する"
    required_level: 5
    skills_tested: [industrial_iot, data_analytics]
    xp_reward: 500
    unlocks:
      - iot_badge
      - factory_floor_access

  - id: breakdown_preventer
    name: "故障の予言者"
    description: "設備故障の24時間前に早期警告に成功する"
    required_level: 10
    skills_tested: [predictive_maintenance, digital_twin]
    xp_reward: 1000
    unlocks:
      - maintenance_master_title
      - control_room_access

  - id: factory_architect
    name: "スマート工場建築師"
    description: "完全なスマート工場を設計・展開する"
    required_level: 20
    skills_tested: [lights_out_factory, ai_quality_control]
    xp_reward: 2500
    unlocks:
      - architect_legend_title
      - factory_leadership

achievements:
  - id: first_dashboard
    name: "最初のダッシュボード"
    description: "生産ラインのリアルタイム監視ダッシュボードを構築する"
    xp_reward: 100
    badge_type: bronze

  - id: yield_booster
    name: "良品率向上者"
    description: "生産ライン良品率を90%から99%に向上させる"
    xp_reward: 250
    badge_type: silver

  - id: zero_downtime
    name: "ゼロダウンタイム記録"
    description: "90日連続で計画外の生産停止ゼロを達成する"
    xp_reward: 500
    badge_type: gold

  - id: factory_legend
    name: "工場の伝説"
    description: "すべてのスマート製造チャレンジを完了する"
    xp_reward: 1000
    badge_type: platinum

example_tasks:
  beginner:
    - id: sensor_setup
      type: interaction
      title: "センサー設置"
      description: "CNC旋盤に振動・温度センサーを取り付ける"
      skills_improved: [industrial_iot]
      xp_reward: 60

    - id: production_analysis
      type: analysis
      title: "生産ラインデータ分析"
      description: "1週間分の生産データを分析して効率ボトルネックを発見する"
      skills_improved: [data_analytics]
      xp_reward: 50

  intermediate:
    - id: twin_creation
      type: creation
      title: "デジタルツインモデリング"
      description: "SMT生産ラインのデジタルツインモデルを構築する"
      skills_improved: [digital_twin, data_analytics]
      xp_reward: 180

    - id: aoi_system
      type: creation
      title: "AIビジュアル検査システム"
      description: "PCB基板上の半田付け欠陥を自動検出するモデルを訓練する"
      skills_improved: [ai_quality_control, automation]
      xp_reward: 200

  advanced:
    - id: predictive_system
      type: creation
      title: "予知保全システム"
      description: "工場全設備の健康スコアリングと故障予測システムを構築する"
      skills_improved: [predictive_maintenance, industrial_iot]
      xp_reward: 350

    - id: autonomous_factory
      type: creation
      title: "自律工場設計"
      description: "スケジューリングから品質検査まで全自動の無人工場を設計する"
      skills_improved: [lights_out_factory, digital_twin]
      xp_reward: 400

learning_objectives:
  - "産業用IoTのアーキテクチャとセンサー技術を理解する"
  - "製造データの収集・分析手法をマスターする"
  - "PLCとSCADA自動化システムを設計する"
  - "生産ラインのデジタルツインモデルを構築する"
  - "AIを活用した予知保全を実施する"
  - "コンピュータビジョンによる品質検査を実装する"
  - "無人化無人工場を設計する"
  - "スマート製造と第4次産業革命の発展を理解する"

career_outcomes:
  - "スマート製造エンジニア"
  - "産業用IoTアーキテクト"
  - "デジタルツインエンジニア"
  - "製造データサイエンティスト"
  - "自動化システムインテグレーター"
  - "予知保全エンジニア"
  - "AI品質エンジニア"
  - "スマート工場コンサルタント"
