# Smart Manufacturing Engineer Discovery Path - Thai
path_id: smart_manufacturing_engineer
category: technology
difficulty_range: beginner_to_expert

metadata:
  title: "ผู้บัญชาการโรงงานดิจิทัล - ผู้จัดการปฏิบัติการโรงงานอัจฉริยะ"
  short_description: "แปลงโรงงานแบบดั้งเดิมให้เป็นระบบผลิตอัจฉริยะและอัตโนมัติ"
  long_description: |
    คุณเป็นวิศวกรมือใหม่ที่ "โรงงานดิจิทัล" ที่นี่เครื่องจักรสื่อสารกัน หุ่นยนต์ทำงานตลอดคืนโดยไม่ต้องมีคนเข้ามาดูแล และปัญญาประดิษฐ์ตรวจจับข้อบกพร่องก่อนที่จะเกิดขึ้น ในโรงงานแห่งอนาคตที่ได้แรงบันดาลใจจากระบบอัตโนมัติไฟดับของ Foxconn นี้ คุณจะเรียนรู้ว่าเซ็นเซอร์ ข้อมูล และอัลกอริทึมอัจฉริยะรวมกันสร้างโรงงานที่บริหารจัดการตัวเองได้อย่างไร การผลิตกำลังถูกสร้างใหม่ และคุณคือผู้นำการปฏิวัตินี้

  estimated_hours: 55
  skill_focus:
    - iot_sensors
    - digital_twin
    - ai_quality_control
    - predictive_maintenance

world_setting:
  name: "โรงงานดิจิทัล"
  description: |
    โรงงานดิจิทัลเป็นสถานที่ล้ำสมัยที่เครื่องจักรทุกเครื่องเชื่อมต่อกัน ทุกกระบวนการถูกตรวจสอบแบบเรียลไทม์ และ AI ตัดสินใจได้เร็วกว่ามนุษย์ วิศวกรที่นี่ออกแบบระบบที่หุ่นยนต์และมนุษย์ทำงานร่วมกัน digital twin จำลองสายการผลิตทั้งหมด และระบบทำนายป้องกันปัญหาก่อนเกิดขึ้น นี่คือโรงงานแห่งอนาคต

  atmosphere: "futuristic_precision"
  visual_theme: "digital_factory_neon"

starting_scenario:
  title: "การตื่นขึ้นของโรงงาน"
  description: |
    ผู้อำนวยการโรงงาน Mike ประกาศภารกิจที่กล้าหาญ: เปลี่ยนสายการประกอบเก่าให้กลายเป็นโรงงานอัจฉริยะอัตโนมัติเต็มรูปแบบภายในหนึ่งปี คู่แข่งใช้หุ่นยนต์ขับเคลื่อน AI และควบคุมคุณภาพแบบเรียลไทม์อยู่แล้ว คุณต้องเรียนรู้วิธีเชื่อมต่อเครื่องจักรด้วยเซ็นเซอร์ สร้าง digital twin ของสายการผลิต และใช้ข้อมูลกำจัดของเสียและข้อบกพร่อง อนาคตของการผลิตเริ่มต้นตอนนี้

  initial_tasks:
    - connect_first_sensor
    - study_production_data
    - map_factory_processes

skill_tree:
  core_skills:
    - id: iot_sensors
      name: "เครือข่ายเซ็นเซอร์ IoT"
      description: "เชื่อมต่อเครื่องจักรและอุปกรณ์ด้วยเซ็นเซอร์ที่เก็บข้อมูลการผลิตแบบเรียลไทม์"
      max_level: 10
      unlocks:
        - network_protocols
        - data_pipelines

    - id: digital_twin
      name: "ระบบ Digital Twin"
      description: "สร้างสำเนาเสมือนของโรงงานที่สะท้อนสภาพจริงเพื่อการทดสอบและเพิ่มประสิทธิภาพ"
      max_level: 10
      unlocks:
        - simulation_modeling
        - virtual_commissioning

    - id: ai_quality_control
      name: "ควบคุมคุณภาพด้วย AI"
      description: "ใช้ computer vision และ machine learning ตรวจจับข้อบกพร่องของผลิตภัณฑ์โดยอัตโนมัติ"
      max_level: 10
      unlocks:
        - vision_systems
        - defect_classification

    - id: predictive_maintenance
      name: "การบำรุงรักษาเชิงพยากรณ์"
      description: "วิเคราะห์ข้อมูลเครื่องจักรเพื่อทำนายการเสียของอุปกรณ์ก่อนที่จะทำให้หยุดผลิต"
      max_level: 10
      unlocks:
        - anomaly_detection
        - maintenance_scheduling

  advanced_skills:
    - id: robotic_automation
      name: "ระบบอัตโนมัติด้วยหุ่นยนต์"
      description: "ออกแบบและเขียนโปรแกรมหุ่นยนต์สำหรับงานประกอบและเคลื่อนย้ายวัสดุที่ซับซ้อน"
      max_level: 15
      requires: [iot_sensors, digital_twin]

    - id: supply_chain_intelligence
      name: "ห่วงโซ่อุปทานอัจฉริยะ"
      description: "เพิ่มประสิทธิภาพการไหลของวัสดุและชิ้นส่วนด้วยการจัดการห่วงโซ่อุปทานที่ขับเคลื่อนด้วย AI"
      max_level: 15
      requires: [iot_sensors, ai_quality_control]

    - id: lights_out_manufacturing
      name: "การผลิตแบบไฟดับ"
      description: "ออกแบบระบบผลิตอัตโนมัติเต็มรูปแบบที่ทำงาน 24/7 โดยไม่ต้องมีคนเข้ามาดูแล"
      max_level: 15
      requires: [robotic_automation, predictive_maintenance]

milestone_quests:
  - id: first_connected_line
    name: "สายงานแรกที่เชื่อมต่อ"
    description: "เชื่อมต่อสายการผลิตทั้งหมดด้วยเซ็นเซอร์ IoT และแสดงข้อมูลแบบเรียลไทม์ได้สำเร็จ"
    required_level: 5
    skills_tested: [iot_sensors, digital_twin]
    xp_reward: 500
    unlocks:
      - connected_factory_badge
      - advanced_lab_access

  - id: zero_defect_challenge
    name: "ความท้าทายข้อบกพร่องเป็นศูนย์"
    description: "ใช้ระบบควบคุมคุณภาพ AI ที่บรรลุความแม่นยำในการตรวจจับข้อบกพร่อง 99.9%"
    required_level: 10
    skills_tested: [ai_quality_control, digital_twin]
    xp_reward: 1000
    unlocks:
      - quality_guardian_title
      - vision_lab_access

  - id: lights_out_factory
    name: "โรงงานแบบไฟดับ"
    description: "ออกแบบระบบผลิตที่ทำงานต่อเนื่อง 72 ชั่วโมงโดยไม่ต้องมีคนเข้ามาดูแล"
    required_level: 20
    skills_tested: [lights_out_manufacturing, robotic_automation]
    xp_reward: 2500
    unlocks:
      - factory_commander_title
      - factory_leadership

achievements:
  - id: first_connection
    name: "การเชื่อมต่อแรก"
    description: "เชื่อมต่อเครื่องจักรเครื่องแรกกับเครือข่าย IoT ได้สำเร็จ"
    xp_reward: 100
    badge_type: bronze

  - id: defect_detective
    name: "นักสืบข้อบกพร่อง"
    description: "ใช้ AI vision ตรวจจับข้อบกพร่องของผลิตภัณฑ์ 100 รายการโดยอัตโนมัติ"
    xp_reward: 250
    badge_type: silver

  - id: uptime_champion
    name: "แชมป์เวลาทำงาน"
    description: "ป้องกันความล้มเหลวของอุปกรณ์ 5 ครั้งโดยใช้การแจ้งเตือนการบำรุงรักษาเชิงพยากรณ์"
    xp_reward: 500
    badge_type: gold

  - id: factory_legend
    name: "ตำนานโรงงาน"
    description: "ทำความท้าทายการผลิตอัจฉริยะทั้งหมดในโรงงานดิจิทัลให้สำเร็จ"
    xp_reward: 1000
    badge_type: platinum

example_tasks:
  beginner:
    - id: sensor_setup
      type: technical
      title: "ตั้งค่าเครือข่ายเซ็นเซอร์"
      description: "เชื่อมต่อเซ็นเซอร์อุณหภูมิ การสั่นสะเทือน และความเร็วกับเครื่องผลิตจำลอง"
      skills_improved: [iot_sensors]
      xp_reward: 60

    - id: data_dashboard
      type: analysis
      title: "แดชบอร์ดข้อมูลการผลิต"
      description: "สร้างแดชบอร์ดเรียลไทม์แสดงตัวชี้วัดการผลิตหลักจากข้อมูลเซ็นเซอร์"
      skills_improved: [iot_sensors, digital_twin]
      xp_reward: 50

  intermediate:
    - id: twin_builder
      type: creation
      title: "สร้าง Digital Twin"
      description: "สร้าง digital twin ของเซลการผลิตที่สะท้อนพฤติกรรมเครื่องจักรจริง"
      skills_improved: [digital_twin, iot_sensors]
      xp_reward: 180

    - id: ai_inspector
      type: creation
      title: "ผู้ตรวจสอบคุณภาพ AI"
      description: "ฝึกโมเดล computer vision เพื่อระบุข้อบกพร่องพื้นผิวบนชิ้นส่วนที่ผลิต"
      skills_improved: [ai_quality_control]
      xp_reward: 200

  advanced:
    - id: predictive_system
      type: creation
      title: "ระบบบำรุงรักษาเชิงพยากรณ์"
      description: "ออกแบบระบบทำนายความล้มเหลวของเครื่องจักรล่วงหน้า 48 ชั่วโมงโดยใช้ข้อมูลการสั่นสะเทือน"
      skills_improved: [predictive_maintenance, iot_sensors]
      xp_reward: 350

    - id: autonomous_line
      type: creation
      title: "สายการผลิตอัตโนมัติ"
      description: "ออกแบบลำดับการผลิตอัตโนมัติเต็มรูปแบบพร้อมการจัดการหุ่นยนต์และควบคุมคุณภาพ AI"
      skills_improved: [lights_out_manufacturing, robotic_automation]
      xp_reward: 400

learning_objectives:
  - "เข้าใจวิธีที่เซ็นเซอร์ IoT เก็บรวบรวมและส่งข้อมูลโรงงานแบบเรียลไทม์"
  - "เรียนรู้วิธีสร้างการจำลอง digital twin ของระบบการผลิตทางกายภาพ"
  - "นำ computer vision และ machine learning ไปใช้กับการตรวจสอบคุณภาพอัตโนมัติ"
  - "ออกแบบระบบบำรุงรักษาเชิงพยากรณ์ที่ป้องกันความล้มเหลวของอุปกรณ์ที่มีค่าใช้จ่ายสูง"
  - "เข้าใจวิธีที่ระบบหุ่นยนต์ถูกเขียนโปรแกรมสำหรับงานการผลิตที่ยืดหยุ่น"
  - "วิเคราะห์ข้อมูลการผลิตเพื่อระบุการปรับปรุงประสิทธิภาพและลดของเสีย"
  - "ออกแบบระบบโรงงานที่เชื่อมต่อกันซึ่งเครื่องจักรสื่อสารและเพิ่มประสิทธิภาพตัวเอง"
  - "สำรวจอนาคตของการผลิตแบบไฟดับและโรงงานอัตโนมัติเต็มรูปแบบ"

career_outcomes:
  - "ผู้จัดการปฏิบัติการโรงงานอัจฉริยะ"
  - "วิศวกร IoT อุตสาหกรรม"
  - "ผู้เชี่ยวชาญ Digital Twin"
  - "วิศวกรระบบอัตโนมัติหุ่นยนต์"
  - "วิศวกรควบคุมคุณภาพ AI"
  - "วิศวกรการบำรุงรักษาเชิงพยากรณ์"
  - "นักวิทยาศาสตร์ข้อมูลการผลิต"
  - "ที่ปรึกษา Industry 4.0"
