# Ruta de Descubrimiento: Ingeniero de Manufactura Inteligente - Español
path_id: smart_manufacturing_engineer
category: manufacturing
difficulty_range: beginner_to_expert

metadata:
  title: "Alquimista Industrial - Ingeniero de Manufactura Inteligente"
  short_description: "Usa IA y datos para convertir fábricas en organismos que piensan por sí mismos"
  long_description: |
    Eres un aprendiz alquimista en la «Fábrica Digital», dotado del talento para hacer
    que las líneas de producción evolucionen por sí solas. En esta fábrica del futuro
    que combina IoT, IA y gemelos digitales, los datos de cada sensor ayudan a las
    máquinas a tomar decisiones autónomas — y tu misión es construir la línea de
    producción inteligente que nunca se detiene.

  estimated_hours: 50
  skill_focus:
    - industrial_iot
    - digital_twin
    - predictive_maintenance
    - production_optimization

world_setting:
  name: "Fábrica Digital"
  description: |
    La Fábrica Digital es una base de producción donde el mundo físico y el virtual
    se reflejan a la perfección. Cada máquina tiene su gemelo digital, cada proceso
    está impulsado por datos. La fábrica a oscuras de Foxconn es la máxima expresión
    de este sistema.

  atmosphere: "industrial_digital"
  visual_theme: "digital_factory"

starting_scenario:
  title: "El Despertar Digital de la Fábrica"
  description: |
    El director de fábrica Forge te lleva a una fábrica tradicional — las líneas de
    producción son ineficientes y las tasas de rendimiento son inestables. De repente
    una máquina central llamada Breakdown emite una vibración anormal. Debes usar los
    datos del sensor para predecir cuándo va a fallar.

  initial_tasks:
    - learn_iot_basics
    - understand_sensors
    - first_data_collection

skill_tree:
  core_skills:
    - id: industrial_iot
      name: "IoT Industrial"
      description: "Desplegar redes de sensores para recopilar datos de producción"
      max_level: 10
      unlocks:
        - sensor_deployment
        - edge_computing

    - id: data_analytics
      name: "Análisis de Datos de Manufactura"
      description: "Analizar datos de producción para encontrar cuellos de botella y anomalías"
      max_level: 10
      unlocks:
        - spc_analysis
        - yield_optimization

    - id: automation
      name: "Control de Automatización"
      description: "Diseñar sistemas de automatización PLC y SCADA"
      max_level: 10
      unlocks:
        - plc_programming
        - scada_design

    - id: digital_twin
      name: "Gemelo Digital"
      description: "Construir réplicas virtuales de líneas de producción para simulación"
      max_level: 10
      unlocks:
        - 3d_simulation
        - process_modeling

  advanced_skills:
    - id: predictive_maintenance
      name: "Mantenimiento Predictivo"
      description: "Usar IA para dar alertas tempranas antes del fallo del equipo"
      max_level: 15
      requires: [industrial_iot, data_analytics]

    - id: ai_quality_control
      name: "Control de Calidad con IA"
      description: "Usar visión por computadora para detectar defectos automáticamente"
      max_level: 15
      requires: [data_analytics, automation]

    - id: lights_out_factory
      name: "Fábrica a Oscuras"
      description: "Diseñar un sistema de producción autónomo completamente no tripulado"
      max_level: 15
      requires: [digital_twin, predictive_maintenance]

milestone_quests:
  - id: first_sensor
    name: "Primer Sensor"
    description: "Desplegar exitosamente un sensor y recopilar datos de producción significativos"
    required_level: 5
    skills_tested: [industrial_iot, data_analytics]
    xp_reward: 500
    unlocks:
      - iot_badge
      - factory_floor_access

  - id: breakdown_preventer
    name: "Profeta de Averías"
    description: "Predecir exitosamente un fallo de equipo con 24 horas de anticipación"
    required_level: 10
    skills_tested: [predictive_maintenance, digital_twin]
    xp_reward: 1000
    unlocks:
      - maintenance_master_title
      - control_room_access

  - id: factory_architect
    name: "Arquitecto de Fábrica Inteligente"
    description: "Diseñar y desplegar una fábrica inteligente completa"
    required_level: 20
    skills_tested: [lights_out_factory, ai_quality_control]
    xp_reward: 2500
    unlocks:
      - architect_legend_title
      - factory_leadership

achievements:
  - id: first_dashboard
    name: "Primer Panel de Control"
    description: "Construir un panel de monitoreo en tiempo real de la línea de producción"
    xp_reward: 100
    badge_type: bronze

  - id: yield_booster
    name: "Impulsor de Rendimiento"
    description: "Elevar la tasa de rendimiento de la línea del 90% al 99%"
    xp_reward: 250
    badge_type: silver

  - id: zero_downtime
    name: "Récord de Cero Tiempo de Inactividad"
    description: "90 días consecutivos sin paradas de producción no planificadas"
    xp_reward: 500
    badge_type: gold

  - id: factory_legend
    name: "Leyenda de la Fábrica"
    description: "Completar todos los desafíos de manufactura inteligente"
    xp_reward: 1000
    badge_type: platinum

example_tasks:
  beginner:
    - id: sensor_setup
      type: interaction
      title: "Instalación de Sensores"
      description: "Instalar sensores de vibración y temperatura en un torno CNC"
      skills_improved: [industrial_iot]
      xp_reward: 60

    - id: production_analysis
      type: analysis
      title: "Análisis de Datos de Línea de Producción"
      description: "Analizar una semana de datos de producción para encontrar cuellos de botella de eficiencia"
      skills_improved: [data_analytics]
      xp_reward: 50

  intermediate:
    - id: twin_creation
      type: creation
      title: "Modelado de Gemelo Digital"
      description: "Construir un modelo de gemelo digital para una línea de producción SMT"
      skills_improved: [digital_twin, data_analytics]
      xp_reward: 180

    - id: aoi_system
      type: creation
      title: "Sistema de Inspección Visual con IA"
      description: "Entrenar un modelo para detectar automáticamente defectos de soldadura en placas PCB"
      skills_improved: [ai_quality_control, automation]
      xp_reward: 200

  advanced:
    - id: predictive_system
      type: creation
      title: "Sistema de Mantenimiento Predictivo"
      description: "Construir un sistema de puntuación de salud y predicción de fallos para todos los equipos"
      skills_improved: [predictive_maintenance, industrial_iot]
      xp_reward: 350

    - id: autonomous_factory
      type: creation
      title: "Diseño de Fábrica Autónoma"
      description: "Diseñar una fábrica a oscuras completamente automatizada desde la programación hasta la inspección"
      skills_improved: [lights_out_factory, digital_twin]
      xp_reward: 400

learning_objectives:
  - "Comprender la arquitectura IoT industrial y la tecnología de sensores"
  - "Dominar los métodos de recopilación y análisis de datos de manufactura"
  - "Diseñar sistemas de automatización PLC y SCADA"
  - "Construir modelos de gemelo digital de líneas de producción"
  - "Aplicar IA para mantenimiento predictivo"
  - "Implementar inspección de calidad por visión computacional"
  - "Diseñar fábricas a oscuras sin operarios"
  - "Comprender el desarrollo de la manufactura inteligente y la Industria 4.0"

career_outcomes:
  - "Ingeniero de Manufactura Inteligente"
  - "Arquitecto de IoT Industrial"
  - "Ingeniero de Gemelos Digitales"
  - "Científico de Datos de Manufactura"
  - "Integrador de Sistemas de Automatización"
  - "Ingeniero de Mantenimiento Predictivo"
  - "Ingeniero de Calidad con IA"
  - "Consultor de Fábrica Inteligente"
