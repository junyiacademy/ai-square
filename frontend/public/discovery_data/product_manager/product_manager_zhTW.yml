# 產品經理探索路徑 - 繁體中文
path_id: product_manager
category: business
difficulty_range: beginner_to_expert

metadata:
  title: "產品領航者 - 產品經理"
  short_description: "在用戶需求、技術限制和商業目標之間找到最佳路線"
  long_description: |
    你是「LaunchPad 產品實驗室」的新進產品經理，擅長將用戶需求、技術能力和商業
    目標融合成強大的產品。在這個充滿創新活力的新創公司中，每一次迭代都是一
    次實驗，你的目標是創造能改變生活的完美產品。

  estimated_hours: 55
  skill_focus:
    - requirement_analysis
    - roadmap_planning
    - cross_team_coordination
    - user_empathy

world_setting:
  name: "LaunchPad 產品實驗室"
  description: |
    LaunchPad 產品實驗室是一間快速成長的新創公司，將想法快速轉化為市場產品。在這裡，產品經
    理學習平衡用戶需求、技術限制和商業目標的核心方法，創造能與數百萬人
    產生共鳴的產品。

  atmosphere: "dynamic_creative"
  visual_theme: "innovation_forge"

starting_scenario:
  title: "產品管理的第一課"
  description: |
    你是「LaunchPad 產品實驗室」的新進產品經理，剛加入一個正在開發中的產品團隊。
    產品總監 Kevin（前 Shopee 台灣產品負責人）一把拉住你說：「你來得正是時候。這款服務台灣數百萬用戶的產品——工程師說功能要三個月，業務說下週就要上線，用戶說兩個版本前的問題還沒修。矽谷的產品團隊也天天面對這種三方拉扯——我需要你告訴我，怎麼辦。」

    【你的任務】分析這個三方衝突的核心矛盾，說明你會如何釐清優先順序，並提出你的溝通和決策策略。
    你需要思考：產品管理者在這種情況下，最重要的職責是什麼？

    【成功標準】提出一個具體的優先順序決策框架，說明你會如何收集資訊、如何跟三個方向的人溝通，以及你建議的第一步行動。
  initial_tasks:
    - understand_users
    - analyze_market
    - define_vision

skill_tree:
  core_skills:
    - id: user_research
      name: "用戶研究"
      description: "深入理解用戶需求和行為——像人類學家一樣觀察用戶，找出他們嘴上沒說的痛點"
      max_level: 10
      unlocks:
        - persona_creation
        - journey_mapping

    - id: product_strategy
      name: "戰略視野"
      description: "制定致勝的產品策略"
      max_level: 10
      unlocks:
        - competitive_analysis
        - positioning_mastery

    - id: feature_prioritization
      name: "優先級排序"
      description: "掌握功能優先排序的藝術——100 件事只能做 3 件，怎麼選最重要"
      max_level: 10
      unlocks:
        - roadmap_planning
        - mvp_design

    - id: stakeholder_management
      name: "跨部門協調"
      description: "協調不同利害關係人的利益——像交通指揮，讓工程、設計、業務同步前進"
      max_level: 10
      unlocks:
        - executive_communication
        - cross_team_collaboration

  advanced_skills:
    - id: growth_hacking
      name: "成長策略"
      description: "推動產品指數級成長——用最小成本驗證最大成長機會"
      max_level: 15
      requires: [product_strategy, user_research]

    - id: data_driven_decisions
      name: "數據驅動決策"
      description: "基於數據洞察做決策——用 A/B 測試和指標取代拍腦袋"
      max_level: 15
      requires: [feature_prioritization, user_research]

    - id: platform_thinking
      name: "產品生態系"
      description: "建立產品平台和生態系統——從單一產品擴展成互相加值的產品網絡"
      max_level: 15
      requires: [product_strategy, stakeholder_management]

milestone_quests:
  - id: first_launch
    name: "首次上線"
    description: "成功推出你的第一個產品"
    required_level: 5
    skills_tested: [user_research, feature_prioritization]
    xp_reward: 600
    unlocks:
      - launch_specialist_badge
      - user_testimonials

  - id: deadline_balance
    name: "時間與品質"
    description: "在時間壓力下交付高品質產品"
    required_level: 10
    skills_tested: [stakeholder_management, product_strategy]
    xp_reward: 1200
    unlocks:
      - balance_master_title
      - deadline_immunity

  - id: unicorn_product
    name: "億級用戶產品"
    description: "創造被數百萬人使用的產品"
    required_level: 20
    skills_tested: [growth_hacking, platform_thinking]
    xp_reward: 2500
    unlocks:
      - legendary_pm_title
      - industry_influence

achievements:
  - id: first_spec
    name: "規格撰寫者"
    description: "撰寫你的第一份產品規格"
    xp_reward: 100
    badge_type: bronze

  - id: user_champion
    name: "用戶代言人"
    description: "實現 20 個用戶要求的功能"
    xp_reward: 300
    badge_type: silver

  - id: revenue_generator
    name: "營收推手"
    description: "推動產品創造 100 萬美元營收"
    xp_reward: 600
    badge_type: gold

  - id: pm_legend
    name: "資深產品人"
    description: "完成所有產品挑戰"
    xp_reward: 1200
    badge_type: platinum

example_tasks:
  beginner:
    - id: user_interviews
      type: analysis
      title: "聲音收集"
      description: "進行用戶訪談收集洞察"
      skills_improved: [user_research, user_resonance]
      xp_reward: 60

    - id: competitive_analysis
      type: analysis
      title: "市場掃描"
      description: "分析競爭對手產品"
      skills_improved: [product_strategy, requirement_alchemy]
      xp_reward: 70

  intermediate:
    - id: roadmap_creation
      type: creation
      title: "未來路徑設計"
      description: "創建產品路線圖"
      skills_improved: [roadmap_planning, roadmap_prophecy]
      xp_reward: 180

    - id: feature_launch
      type: creation
      title: "功能上線"
      description: "推出主要產品功能"
      skills_improved: [feature_prioritization, stakeholder_management]
      xp_reward: 200

  advanced:
    - id: platform_design
      type: creation
      title: "生態系創造"
      description: "設計產品平台"
      skills_improved: [platform_thinking, product_strategy]
      xp_reward: 400

    - id: growth_experiment
      type: analysis
      title: "成長公式"
      description: "執行成長實驗擴展產品"
      skills_improved: [growth_hacking, data_driven_decisions]
      xp_reward: 350

learning_objectives:
  - "精通用戶研究和同理心技巧"
  - "發展戰略性產品思維"
  - "學習有效地排序功能優先級"
  - "在不同利害關係人之間建立共識"
  - "使用數據驅動產品決策"
  - "創造並傳達產品願景"
  - "平衡商業目標與用戶需求"
  - "將產品從初創擴展到成熟"

career_outcomes:
  - "產品經理"
  - "高級產品經理"
  - "產品總監"
  - "首席產品官"
  - "產品策略顧問"
  - "新創產品負責人"
  - "成長產品經理"
  - "平台產品經理"
