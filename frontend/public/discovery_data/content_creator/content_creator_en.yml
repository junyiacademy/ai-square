# Content Creator Discovery Path - English
path_id: content_creator
category: arts
difficulty_range: beginner_to_expert

metadata:
  title: "Digital Storyteller - Content Creator"
  short_description: "Build engaged audiences through compelling text, graphics, and social media"
  long_description: |
    You are a new member of the "Creative Studio," possessing the ability to transform
    ideas into viral content through writing, graphics, and social media. In this digital
    landscape, every like and share reflects your creative impact, and your mentor Amy
    will teach you to master content strategy and platform algorithms.

  estimated_hours: 50
  skill_focus:
    - content_strategy
    - visual_design
    - copywriting
    - community_building

world_setting:
  name: "Creative Studio"
  description: |
    The Creative Studio is a digital workspace powered by creative energy. Content creators
    here learn to leverage algorithms, engagement strategies, and viral mechanics to
    build their influence and impact millions of lives.

  atmosphere: "vibrant_creative"
  visual_theme: "digital_studio"

starting_scenario:
  title: "The Misinformation Challenge"
  description: |
    Creative Mentor Amy welcomes you to the studio with urgent news: a rival creator
    is spreading false content using clickbait tactics, threatening the credibility
    of the creative community. You must use the power of authentic creativity to combat
    misinformation and build trust with your audience.

  initial_tasks:
    - understand_algorithms
    - learn_content_basics
    - create_first_post

skill_tree:
  core_skills:
    - id: content_strategy
      name: "Strategic Vision"
      description: "Master content planning and strategy"
      max_level: 10
      unlocks:
        - trend_analysis
        - audience_targeting

    - id: visual_creation
      name: "Visual Design"
      description: "Create compelling visual content"
      max_level: 10
      unlocks:
        - photo_editing
        - graphic_design

    - id: storytelling
      name: "Narrative Weaving"
      description: "Craft engaging stories"
      max_level: 10
      unlocks:
        - emotional_resonance
        - viral_mechanics

    - id: community_building
      name: "Community Building"
      description: "Build and engage communities"
      max_level: 10
      unlocks:
        - engagement_strategies
        - audience_retention

  advanced_skills:
    - id: algorithm_mastery
      name: "SEO & Algorithm Strategy"
      description: "Understand and work with platform algorithms"
      max_level: 15
      requires: [content_strategy, community_building]

    - id: monetization_magic
      name: "Content Monetization"
      description: "Transform content into income"
      max_level: 15
      requires: [community_building, visual_creation]

    - id: brand_building
      name: "Brand Building"
      description: "Build a powerful personal brand"
      max_level: 15
      requires: [storytelling, content_strategy]

milestone_quests:
  - id: first_viral
    name: "Viral Breakthrough"
    description: "Create your first viral content"
    required_level: 5
    skills_tested: [content_strategy, visual_creation]
    xp_reward: 500
    unlocks:
      - viral_creator_badge
      - algorithm_insights

  - id: shadow_confrontation
    name: "Truth vs Deception"
    description: "Counter a misinformation campaign with authentic content"
    required_level: 10
    skills_tested: [storytelling, community_building]
    xp_reward: 1000
    unlocks:
      - truth_guardian_title
      - authentic_voice

  - id: empire_builder
    name: "Creative Empire"
    description: "Build a content empire with 1M followers"
    required_level: 20
    skills_tested: [algorithm_mastery, brand_building]
    xp_reward: 2000
    unlocks:
      - empire_ruler_title
      - legacy_creator

achievements:
  - id: first_post
    name: "First Post"
    description: "Create your first piece of content"
    xp_reward: 50
    badge_type: bronze

  - id: engagement_master
    name: "Community Champion"
    description: "Achieve 10K total engagements"
    xp_reward: 200
    badge_type: silver

  - id: consistency_king
    name: "Consistency Champion"
    description: "Post consistently for 30 days"
    xp_reward: 400
    badge_type: gold

  - id: content_legend
    name: "Legendary Creator"
    description: "Complete all content challenges"
    xp_reward: 800
    badge_type: platinum

example_tasks:
  beginner:
    - id: content_planning
      type: creation
      title: "Content Planning Workshop"
      description: "Develop content formulas that touch hearts"
      skills_improved: [content_strategy, storytelling]
      xp_reward: 50

    - id: visual_basics
      type: creation
      title: "Visual Content Basics"
      description: "Create your first visual content"
      skills_improved: [visual_creation, visual_design]
      xp_reward: 60

  intermediate:
    - id: engagement_analysis
      type: analysis
      title: "Analytics Deep Dive"
      description: "Analyze content performance and audience behavior"
      skills_improved: [algorithm_mastery, community_building]
      xp_reward: 150

    - id: series_creation
      type: creation
      title: "Content Series Creation"
      description: "Create a content series"
      skills_improved: [storytelling, brand_building]
      xp_reward: 180

  advanced:
    - id: viral_campaign
      type: creation
      title: "Viral Campaign Launch"
      description: "Launch a viral content campaign"
      skills_improved: [algorithm_mastery, viral_mechanics]
      xp_reward: 350

    - id: monetization_setup
      type: creation
      title: "Revenue Stream Setup"
      description: "Set up multiple revenue streams"
      skills_improved: [monetization_magic, brand_building]
      xp_reward: 400

learning_objectives:
  - "Master content strategy and planning"
  - "Create engaging visual and written content"
  - "Build and nurture online communities"
  - "Understand platform algorithms and trends"
  - "Develop a unique creative voice"
  - "Monetize content effectively"
  - "Combat misinformation with truth"
  - "Build a sustainable content business"

career_outcomes:
  - "Social Media Influencer"
  - "Content Strategist"
  - "Brand Ambassador"
  - "Digital Marketing Manager"
  - "Creative Director"
  - "Community Manager"
  - "Content Marketing Lead"
  - "Chief Content Officer"
