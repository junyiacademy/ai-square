# 內容創作者探索路徑 - 繁體中文
path_id: content_creator
category: arts
difficulty_range: beginner_to_expert

metadata:
  title: "圖文創作者 - 內容創作者"
  short_description: "用文字與圖文打造深入人心的內容——部落格、電子報、社群圖文、文案"
  long_description: |
    你是「Pulse 創意工作室」的新進創作者，擅長用文字和圖文將想法轉化為吸引人的內容。
    在這個充滿活力的數位媒體公司中，每個讚數和分享都是創意影響力的證明，而你的導師
    Amy（數位行銷總監，前 TVBS 新媒體主編，經營 50 萬粉絲自媒體）將教你掌握內容策略與演算法的技巧。

  estimated_hours: 50
  skill_focus:
    - content_strategy
    - visual_design
    - copywriting
    - community_management

world_setting:
  name: "Pulse 創意工作室"
  description: |
    Pulse 創意工作室是一間由創意驅動的數位媒體公司。內容創作者在此學習掌控演算法、
    社群互動和病毒式傳播的核心策略，建立自己的影響力並觸動數百萬人的生活。

  atmosphere: "vibrant_creative"
  visual_theme: "digital_studio"

starting_scenario:
  title: "信任危機"
  description: |
    你是「Pulse 創意工作室」的新進創作者，剛通過試用期進入正式團隊。
    數位行銷總監 Amy一見到你就皺起眉頭：
    「工作室出事了。有人在散布偽裝成真實內容的假訊息，我們的信譽正在崩塌——連台灣 YouTube 和 Instagram 上的粉絲也開始質疑我們。這不只是台灣的問題，全球內容創作者都面臨假訊息的侵蝕，YouTube Shorts 和 Netflix 都在強化真實性審查機制。」

    【你的任務】分析這些假內容是如何在平台上病毒式擴散的，並提出應對策略。
    你需要思考：真實內容和假訊息在呈現方式上有什麼差異？創作者如何用真正的創意力量重建信任？

    【成功標準】提出一個有說服力的內容策略，說明你會怎麼用真實、有價值的內容對抗假訊息的影響力。
  initial_tasks:
    - understand_algorithms
    - learn_content_basics
    - create_first_content

skill_tree:
  core_skills:
    - id: content_strategy
      name: "戰略視野"
      description: "掌握內容規劃和策略"
      max_level: 10
      unlocks:
        - trend_analysis
        - audience_targeting

    - id: visual_creation
      name: "圖文設計"
      description: "創造引人注目的圖文內容——用 Canva、Figma 把想法變成一張張會說話的圖"
      max_level: 10
      unlocks:
        - photo_editing
        - graphic_design

    - id: storytelling
      name: "敘事編織"
      description: "打造引人入勝的故事"
      max_level: 10
      unlocks:
        - emotional_resonance
        - viral_mechanics

    - id: community_building
      name: "社群經營"
      description: "建立並經營社群——像經營一家街角咖啡店，讓人想一來再來"
      max_level: 10
      unlocks:
        - engagement_tactics
        - loyalty_building

  advanced_skills:
    - id: algorithm_mastery
      name: "SEO 與演算法"
      description: "理解並駕馭平台演算法——搞懂平台的遊戲規則，讓好內容被更多人看見"
      max_level: 15
      requires: [content_strategy, community_building]

    - id: monetization_magic
      name: "內容變現"
      description: "將內容轉化為收入——業配、聯盟行銷、付費訂閱，把流量變成現金流"
      max_level: 15
      requires: [community_building, visual_creation]

    - id: brand_building
      name: "品牌建立"
      description: "建立強大的個人品牌——讓別人一看到你的風格就知道是你"
      max_level: 15
      requires: [storytelling, content_strategy]

milestone_quests:
  - id: first_viral
    name: "病毒式突破"
    description: "創造你的第一個病毒式內容"
    required_level: 5
    skills_tested: [content_strategy, visual_creation]
    xp_reward: 500
    unlocks:
      - viral_creator_badge
      - algorithm_insights

  - id: shadow_confrontation
    name: "真相對抗欺騙"
    description: "擊敗 Shadow 的假訊息活動"
    required_level: 10
    skills_tested: [storytelling, community_building]
    xp_reward: 1000
    unlocks:
      - truth_guardian_title
      - authentic_voice

  - id: empire_builder
    name: "百萬粉絲品牌"
    description: "建立擁有百萬追蹤者的內容品牌"
    required_level: 20
    skills_tested: [algorithm_mastery, brand_building]
    xp_reward: 2000
    unlocks:
      - top_creator_title
      - legacy_creator

achievements:
  - id: first_post
    name: "首篇發布"
    description: "創造你的第一個內容"
    xp_reward: 50
    badge_type: bronze

  - id: engagement_master
    name: "社群冠軍"
    description: "達到 1 萬次總互動"
    xp_reward: 200
    badge_type: silver

  - id: consistency_king
    name: "日更達人"
    description: "連續 30 天發布內容"
    xp_reward: 400
    badge_type: gold

  - id: content_legend
    name: "傳奇創作者"
    description: "完成所有內容挑戰"
    xp_reward: 800
    badge_type: platinum

example_tasks:
  beginner:
    - id: content_planning
      type: creation
      title: "內容企劃"
      description: "規劃能觸動人心的內容主題與排程"
      skills_improved: [content_strategy, storytelling]
      xp_reward: 50

    - id: visual_basics
      type: creation
      title: "圖文創作入門"
      description: "創造你的第一個圖文內容"
      skills_improved: [visual_creation, content_strategy]
      xp_reward: 60

  intermediate:
    - id: engagement_analysis
      type: analysis
      title: "成效分析"
      description: "分析內容表現和觀眾行為"
      skills_improved: [algorithm_mastery, community_building]
      xp_reward: 150

    - id: series_creation
      type: creation
      title: "系列專欄"
      description: "創造主題式的內容系列"
      skills_improved: [storytelling, brand_building]
      xp_reward: 180

  advanced:
    - id: viral_campaign
      type: creation
      title: "病毒式行銷企劃"
      description: "發起病毒式內容活動"
      skills_improved: [algorithm_mastery, viral_mechanics]
      xp_reward: 350

    - id: monetization_setup
      type: creation
      title: "多元變現佈局"
      description: "建立多重收入來源"
      skills_improved: [monetization_magic, brand_building]
      xp_reward: 400

learning_objectives:
  - "精通內容策略和規劃"
  - "創造引人入勝的視覺和文字內容"
  - "建立並培養線上社群"
  - "理解平台演算法和趨勢"
  - "發展獨特的創意聲音"
  - "有效地將內容變現"
  - "用真相對抗錯誤訊息"
  - "建立永續的內容事業"

career_outcomes:
  - "社群媒體影響者"
  - "內容策略師"
  - "品牌大使"
  - "數位行銷經理"
  - "創意總監"
  - "社群經理"
  - "內容行銷主管"
  - "首席內容官"
