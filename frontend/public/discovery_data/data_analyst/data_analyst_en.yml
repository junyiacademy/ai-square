# Data Analyst Discovery Path - English
path_id: data_analyst
category: technology
difficulty_range: beginner_to_expert

metadata:
  title: "Data Strategist - Data Analyst"
  short_description: "Discover hidden truths in the ocean of data"
  long_description: |
    You are a junior analyst at the "Data Analytics Center," possessing the analytical
    ability to identify future trends in complex datasets. In this center filled with
    numbers and charts, every data point contains important messages, and your mission
    is to uncover the insights behind these numbers.

  estimated_hours: 50
  skill_focus:
    - data_wrangling
    - predictive_statistics
    - data_visualization
    - insight_generation

world_setting:
  name: "Data Analytics Center"
  description: |
    The Data Analytics Center is a modern facility that collects data from all over
    the world. Here, data analysts are trained as experts who can interpret the language
    of numbers and reveal truths that shape business decisions.

  atmosphere: "analytical_focused"
  visual_theme: "data_center"

starting_scenario:
  title: "First Day at the Center"
  description: |
    Jason welcomes you to the analytics center, explaining the challenges of
    data-driven decision making. But a threat looms: data quality issues are polluting
    data sources and spreading misleading analyses. You must use rigorous statistical
    methods to find the truth amidst the confusion.

  initial_tasks:
    - learn_data_basics
    - master_tools
    - first_analysis

skill_tree:
  core_skills:
    - id: data_collection
      name: "Data Gathering"
      description: "Master the art of collecting and cleaning data"
      max_level: 10
      unlocks:
        - web_scraping
        - api_mastery

    - id: statistical_analysis
      name: "Statistical Analysis"
      description: "Apply statistical methods to reveal patterns"
      max_level: 10
      unlocks:
        - hypothesis_testing
        - regression_analysis

    - id: data_visualization
      name: "Data Visualization"
      description: "Transform data into compelling visual stories"
      max_level: 10
      unlocks:
        - dashboard_creation
        - interactive_charts

    - id: business_intelligence
      name: "Strategic Insights"
      description: "Convert data into actionable business wisdom"
      max_level: 10
      unlocks:
        - kpi_tracking
        - forecasting

  advanced_skills:
    - id: machine_learning
      name: "Predictive Modeling"
      description: "Use ML to predict future outcomes"
      max_level: 15
      requires: [statistical_analysis, data_collection]

    - id: big_data_mastery
      name: "Massive Data Manipulation"
      description: "Handle and analyze enormous datasets"
      max_level: 15
      requires: [data_collection, business_intelligence]

    - id: real_time_analytics
      name: "Real-Time Analytics"
      description: "Perform real-time data analysis"
      max_level: 15
      requires: [data_visualization, statistical_analysis]

milestone_quests:
  - id: first_insight
    name: "First Revelation"
    description: "Discover your first meaningful business insight"
    required_level: 5
    skills_tested: [data_collection, statistical_analysis]
    xp_reward: 500
    unlocks:
      - insight_badge
      - temple_recognition

  - id: chaos_detection
    name: "Chaos Hunter"
    description: "Detect and correct misleading data manipulations"
    required_level: 10
    skills_tested: [data_visualization, business_intelligence]
    xp_reward: 1000
    unlocks:
      - truth_seeker_title
      - advanced_access

  - id: oracle_ascension
    name: "Senior Analyst"
    description: "Predict a major trend before it happens"
    required_level: 20
    skills_tested: [machine_learning, real_time_analytics]
    xp_reward: 2500
    unlocks:
      - senior_analyst_title
      - team_leadership

achievements:
  - id: first_dashboard
    name: "First Vision"
    description: "Create your first data dashboard"
    xp_reward: 100
    badge_type: bronze

  - id: data_detective
    name: "Data Detective"
    description: "Find 10 data quality issues"
    xp_reward: 250
    badge_type: silver

  - id: prediction_master
    name: "Prediction Master"
    description: "Make 5 accurate predictions"
    xp_reward: 500
    badge_type: gold

  - id: oracle_legend
    name: "Analytics Legend"
    description: "Complete all data challenges"
    xp_reward: 1000
    badge_type: platinum

example_tasks:
  beginner:
    - id: data_cleaning
      type: analysis
      title: "Data Collection & Cleaning"
      description: "Collect and clean a messy dataset"
      skills_improved: [data_collection, data_wrangling]
      xp_reward: 60

    - id: basic_stats
      type: analysis
      title: "Statistical Foundations"
      description: "Perform basic statistical analysis"
      skills_improved: [statistical_analysis]
      xp_reward: 50

  intermediate:
    - id: trend_analysis
      type: analysis
      title: "Trend Analysis Deep Dive"
      description: "Conduct deep trend analysis"
      skills_improved: [statistical_analysis, business_intelligence]
      xp_reward: 180

    - id: dashboard_design
      type: creation
      title: "Vision Dashboard"
      description: "Create an interactive business dashboard"
      skills_improved: [data_visualization, data_visualization]
      xp_reward: 200

  advanced:
    - id: predictive_model
      type: creation
      title: "Predictive Model"
      description: "Build a predictive model"
      skills_improved: [machine_learning, predictive_statistics]
      xp_reward: 350

    - id: real_time_system
      type: creation
      title: "Real-Time Analytics System"
      description: "Create real-time analytics system"
      skills_improved: [real_time_analytics, big_data_mastery]
      xp_reward: 400

learning_objectives:
  - "Master data collection and cleaning techniques"
  - "Apply statistical methods to uncover insights"
  - "Create compelling data visualizations"
  - "Transform data into business recommendations"
  - "Build predictive models using machine learning"
  - "Handle big data efficiently"
  - "Communicate findings effectively"
  - "Maintain data integrity and ethics"

career_outcomes:
  - "Data Analyst"
  - "Business Intelligence Analyst"
  - "Data Scientist"
  - "Analytics Consultant"
  - "Market Research Analyst"
  - "Financial Analyst"
  - "Operations Analyst"
  - "Data Analytics Manager"
