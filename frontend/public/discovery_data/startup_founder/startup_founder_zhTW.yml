# 創業家探索路徑 - 繁體中文
path_id: startup_founder
category: business
difficulty_range: beginner_to_expert

metadata:
  title: "商業冒險家 - 創業家"
  short_description: "在商業荒野中開拓新的貿易路線"
  long_description: |
    你是「Launchpad 創業加速器」的新進創業者，肩負著在競爭激烈的市場中建立自己事業的使命。
    在這個充滿機會與挑戰的加速器中，每個決策都可能改變你的命運，而導師和夥伴們
    將與你共同面對挑戰。

  estimated_hours: 60
  skill_focus:
    - business_intuition
    - market_exploration
    - resource_alchemy
    - risk_navigation

world_setting:
  name: "Launchpad 創業加速器"
  description: |
    Launchpad 創業加速器是台灣頂尖的新創育成機構，創業者在此獲得資金、導師和資源支持。
    成功需要洞察市場的眼光、快速驗證假設的能力，以及在資源有限下創造最大價值的
    執行力。

  atmosphere: "adventurous_challenging"
  visual_theme: "frontier_exploration"

starting_scenario:
  title: "男爵的封鎖"
  description: |
    你是「Launchpad 創業加速器」的新進創業者，帶著你的第一個創業點子和滿腔熱血準備建立自己的事業。
    你的探險夥伴 Scout 從情報線人那裡帶回一個警告：「Baron Greed 已經封鎖了最主要的資源補給路線，你的計畫可能在啟動前就死掉。就連 AppWorks 加速器的人脈網絡也開始觀望，YC 加速器的矽谷校友說這種局面他們也曾遇過。」

    【你的任務】分析你的創業計畫面臨的主要障礙，說明你會如何找到替代資源和突破封鎖的策略。
    你需要思考：在資源受限的情況下，創業者最重要的核心能力是什麼？台灣新創生態圈有哪些資源可以善用？

    【成功標準】提出一個「資源受限創業計畫」，說明你的核心價值主張、最小可行產品，以及你如何在有限條件下驗證商業模式。
  initial_tasks:
    - survey_market
    - find_resources
    - build_alliances

skill_tree:
  core_skills:
    - id: market_analysis
      name: "市場感知"
      description: "偵測商業機會"
      max_level: 10
      unlocks:
        - trend_spotting
        - competitor_analysis

    - id: resource_management
      name: "資源煉金術"
      description: "將有限資源轉化為價值"
      max_level: 10
      unlocks:
        - bootstrap_mastery
        - efficiency_optimization

    - id: team_building
      name: "盟友召喚"
      description: "建立強大的創始團隊"
      max_level: 10
      unlocks:
        - talent_attraction
        - culture_creation

    - id: product_development
      name: "創新鍛造"
      description: "創造市場致勝產品"
      max_level: 10
      unlocks:
        - mvp_design
        - iteration_mastery

  advanced_skills:
    - id: fundraising
      name: "資本魔法"
      description: "精通募資藝術"
      max_level: 15
      requires: [market_analysis, resource_management]

    - id: scaling_operations
      name: "帝國建設"
      description: "有效擴展業務規模"
      max_level: 15
      requires: [team_building, product_development]

    - id: strategic_pivoting
      name: "適應藝術"
      description: "需要時策略性轉型"
      max_level: 15
      requires: [market_analysis, product_development]

milestone_quests:
  - id: first_customer
    name: "第一桶金"
    description: "獲得你的第一個付費客戶"
    required_level: 5
    skills_tested: [market_analysis, product_development]
    xp_reward: 650
    unlocks:
      - merchant_badge
      - market_credibility

  - id: baron_challenge
    name: "打破壟斷"
    description: "克服 Baron Greed 的市場控制"
    required_level: 10
    skills_tested: [resource_management, strategic_pivoting]
    xp_reward: 1300
    unlocks:
      - freedom_trader_title
      - supplier_network

  - id: empire_established
    name: "貿易帝國"
    description: "建立永續的商業帝國"
    required_level: 20
    skills_tested: [scaling_operations, fundraising]
    xp_reward: 2600
    unlocks:
      - empire_builder_title
      - legacy_founder

achievements:
  - id: first_sale
    name: "首次交易"
    description: "完成你的第一筆成功銷售"
    xp_reward: 75
    badge_type: bronze

  - id: team_assembled
    name: "團隊成立"
    description: "建立 5 人以上的團隊"
    xp_reward: 300
    badge_type: silver

  - id: profitable_quarter
    name: "黃金流動"
    description: "達成首個獲利季度"
    xp_reward: 550
    badge_type: gold

  - id: startup_legend
    name: "傳奇創業家"
    description: "完成所有創業家挑戰"
    xp_reward: 1100
    badge_type: platinum

example_tasks:
  beginner:
    - id: market_research
      type: analysis
      title: "荒野市場探勘"
      description: "深入了解目標市場需求"
      skills_improved: [market_analysis, business_intuition]
      xp_reward: 65

    - id: prototype_creation
      type: creation
      title: "首個貿易站"
      description: "建立最小可行產品"
      skills_improved: [product_development, resource_alchemy]
      xp_reward: 75

  intermediate:
    - id: customer_interviews
      type: chat
      title: "商人談判"
      description: "驗證產品市場契合度"
      skills_improved: [market_exploration, business_intuition]
      xp_reward: 175

    - id: growth_planning
      type: creation
      title: "帝國擴張計畫"
      description: "制定成長策略"
      skills_improved: [scaling_operations, risk_navigation]
      xp_reward: 195

  advanced:
    - id: series_a_prep
      type: creation
      title: "資本任務"
      description: "準備大型募資"
      skills_improved: [fundraising, resource_alchemy]
      xp_reward: 370

    - id: market_expansion
      type: creation
      title: "大陸征服"
      description: "擴展到新市場"
      skills_improved: [strategic_pivoting, market_exploration]
      xp_reward: 410

learning_objectives:
  - "識別並驗證商業機會"
  - "建立客戶喜愛的產品"
  - "精通精實創業方法"
  - "發展領導技能"
  - "駕馭不確定性和風險"
  - "建立強大的公司文化"
  - "獲得資金並管理財務"
  - "永續地擴展業務規模"

career_outcomes:
  - "新創創辦人/執行長"
  - "連續創業家"
  - "創投合夥人"
  - "創新顧問"
  - "新創顧問"
  - "企業內創業家"
  - "加速器總監"
  - "天使投資人"
