# Parcours d'exploration Designer Produit Robotique - Français
path_id: robotics_engineer
category: technology
difficulty_range: beginner_to_expert

metadata:
  title: "Maître de l'Atelier Méca - Designer Produit Robotique"
  short_description: "Construisez des robots qui travaillent aux côtés des humains dans la fabrique du futur"
  long_description: |
    Vous êtes apprenti mécanicien à l'Atelier Méca, où des ingénieurs conçoivent des robots
    qui assemblent des voitures, récoltent des cultures, assistent les chirurgiens et
    explorent les zones sinistrées. La robotique est là où la mécanique, le code et l'IA
    se rencontrent — les machines que vous construisez pourraient changer comment des
    milliards de personnes travaillent et vivent.

  estimated_hours: 55
  skill_focus:
    - sensor_systems
    - motion_control
    - robot_programming
    - human_robot_collaboration

world_setting:
  name: "Atelier Méca"
  description: |
    L'Atelier Méca est un laboratoire d'innovation bouillonnant où des robots de toutes
    formes et tailles sont construits, testés et envoyés dans le monde réel. Défi : créer
    des robots forts, précis et sûrs — et assez intelligents pour travailler aux côtés
    des humains sans accidents.

  atmosphere: "industrial_innovative"
  visual_theme: "robot_workshop"

starting_scenario:
  title: "L'Atelier s'Éveille"
  description: |
    Tony vous confie votre première mission : un robot d'usine sur
    la chaîne de montage percute sans cesse les ouvriers car il ne les détecte pas
    correctement. Réparez son système de capteurs et reprogrammez ses mouvements pour
    éviter les personnes.

  initial_tasks:
    - learn_sensor_basics
    - understand_motors
    - first_program

skill_tree:
  core_skills:
    - id: sensor_systems
      name: "Systèmes de Capteurs"
      description: "Apprenez comment les robots 'voient' le monde avec des caméras, capteurs de distance et capteurs tactiles — les robots ont besoin de capteurs comme nous avons besoin d'yeux et d'oreilles"
      max_level: 10
      unlocks:
        - vision_systems
        - proximity_sensing

    - id: motion_control
      name: "Contrôle de Mouvement"
      description: "Programmez les moteurs et les articulations pour se déplacer avec fluidité et précision — comme apprendre à un robot à marcher, atteindre et ramasser des objets sans les faire tomber"
      max_level: 10
      unlocks:
        - trajectory_planning
        - balance_control

    - id: robot_programming
      name: "Programmation de Robots"
      description: "Écrivez du code qui dit aux robots quoi faire, quand le faire et comment réagir aux situations inattendues — le cerveau derrière la force"
      max_level: 10
      unlocks:
        - task_sequencing
        - error_recovery

    - id: human_robot_collaboration
      name: "Collaboration Humain-Robot"
      description: "Concevez des systèmes où robots et humains travaillent en sécurité côte à côte — le robot doit ralentir, s'arrêter ou s'ajuster quand un humain est à proximité"
      max_level: 10
      unlocks:
        - safety_systems
        - collaborative_tasks

  advanced_skills:
    - id: ai_perception
      name: "Perception par IA"
      description: "Donnez aux robots la capacité de reconnaître des objets, comprendre les environnements et prendre des décisions grâce à l'IA — comme apprendre à un robot à trier des fruits par taille et maturité"
      max_level: 15
      requires: [sensor_systems, robot_programming]

    - id: autonomous_navigation
      name: "Navigation Autonome"
      description: "Programmez des robots pour trouver leur propre chemin dans une usine ou un entrepôt, en évitant les obstacles sans guidage humain"
      max_level: 15
      requires: [motion_control, sensor_systems]

    - id: swarm_robotics
      name: "Essaims de Robots"
      description: "Coordonnez plusieurs robots travaillant ensemble comme une colonie de fourmis — chaque robot est simple, mais ensemble ils accomplissent des tâches complexes"
      max_level: 15
      requires: [robot_programming, human_robot_collaboration]

milestone_quests:
  - id: first_robot_move
    name: "Premiers Pas"
    description: "Programmez un bras robotique pour saisir un objet, le déplacer et le placer précisément à un endroit cible"
    required_level: 5
    skills_tested: [motion_control, robot_programming]
    xp_reward: 500
    unlocks:
      - junior_mechanic_badge
      - workshop_access

  - id: sense_and_avoid
    name: "Le Défi d'Évitement"
    description: "Construisez un robot capable de détecter une personne en mouvement et d'ajuster automatiquement sa trajectoire pour éviter la collision"
    required_level: 10
    skills_tested: [sensor_systems, human_robot_collaboration]
    xp_reward: 1000
    unlocks:
      - safety_engineer_title
      - advanced_lab_access

  - id: full_assembly_line
    name: "Usine sans Lumières"
    description: "Concevez un système robotique complet qui fait tourner une chaîne de montage de manière autonome pendant 1 heure sans intervention humaine"
    required_level: 20
    skills_tested: [autonomous_navigation, ai_perception]
    xp_reward: 2500
    unlocks:
      - master_mechanic_title
      - workshop_leadership

achievements:
  - id: first_task_completed
    name: "Première Tâche Accomplie"
    description: "Programmez un robot pour accomplir une tâche simple du début à la fin sans erreurs"
    xp_reward: 100
    badge_type: bronze

  - id: safety_champion
    name: "Champion de Sécurité"
    description: "Concevez un robot qui réussit les 10 tests de sécurité humaine sans un seul échec"
    xp_reward: 250
    badge_type: silver

  - id: precision_master
    name: "Maître de la Précision"
    description: "Atteindre une précision de positionnement à 1 millimètre sur une tâche de bras robotique"
    xp_reward: 500
    badge_type: gold

  - id: mecha_legend
    name: "Légende de l'Atelier Méca"
    description: "Complétez tous les défis de robotique et construisez un système robotique entièrement autonome"
    xp_reward: 1000
    badge_type: platinum

example_tasks:
  beginner:
    - id: sensor_reading
      type: analysis
      title: "Lire l'Environnement"
      description: "Connectez un capteur de distance à un robot et programmez-le pour s'arrêter quand un obstacle est à moins de 30 cm"
      skills_improved: [sensor_systems]
      xp_reward: 50

    - id: motor_control
      type: design
      title: "Mouvements Fluides"
      description: "Programmez un robot pour aller en avant, tourner à gauche de 90 degrés et revenir à son point de départ"
      skills_improved: [motion_control]
      xp_reward: 60

  intermediate:
    - id: pick_and_place
      type: creation
      title: "Défi Prendre et Placer"
      description: "Programmez un bras robotique pour saisir des objets de tailles différentes et les trier dans les bons bacs"
      skills_improved: [motion_control, robot_programming]
      xp_reward: 180

    - id: collision_avoidance
      type: verification
      title: "Parcours d'Obstacles"
      description: "Guidez un robot dans un labyrinthe d'obstacles en utilisant uniquement ses capteurs — aucun contrôle manuel autorisé"
      skills_improved: [sensor_systems, autonomous_navigation]
      xp_reward: 200

  advanced:
    - id: ai_sorting
      type: creation
      title: "Trieur Intelligent"
      description: "Entraînez un robot à identifier et trier des objets par forme et couleur en utilisant une caméra et l'IA"
      skills_improved: [ai_perception, robot_programming]
      xp_reward: 350

    - id: human_handoff
      type: creation
      title: "Poignée de Main Robot"
      description: "Concevez un système où un robot passe un objet à un ouvrier humain de manière sûre et précise"
      skills_improved: [human_robot_collaboration, sensor_systems]
      xp_reward: 400

learning_objectives:
  - "Comprendre comment les robots perçoivent leur environnement grâce à différents types de capteurs"
  - "Programmer des mouvements de base de robots avec précision et contrôle fluide"
  - "Concevoir des systèmes robotiques qui travaillent en sécurité aux côtés des travailleurs humains"
  - "Appliquer des techniques d'IA pour donner aux robots des capacités de reconnaissance d'objets"
  - "Naviguer des robots de manière autonome dans des environnements complexes du monde réel"
  - "Coordonner plusieurs robots pour accomplir des tâches collaboratives"
  - "Comprendre le rôle de la robotique dans la fabrication moderne comme les usines Foxconn"
  - "Évaluer les compromis de performance robotique entre vitesse, précision et sécurité"

career_outcomes:
  - "Designer Produit Robotique"
  - "Ingénieur en Automatisation"
  - "Programmeur de Robots"
  - "Ingénieur en Systèmes de Fabrication"
  - "Chercheur en Robotique IA"
  - "Ingénieur en Sécurité Industrielle"
  - "Intégrateur de Systèmes Robotiques"
  - "Concepteur d'Interaction Humain-Robot"
