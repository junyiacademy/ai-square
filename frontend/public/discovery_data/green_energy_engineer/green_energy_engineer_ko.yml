# 그린 에너지 엔지니어 탐색 경로 - 한국어
path_id: green_energy_engineer
category: sustainability
difficulty_range: beginner_to_expert

metadata:
  title: "에너지 수호자 - 그린 에너지 엔지니어"
  short_description: "재생에너지와 스마트 그리드로 지구의 미래를 지키다"
  long_description: |
    당신은 「지속 가능 에너지 타워」의 견습 수호자로, 바람·빛·물을
    다루는 타고난 재능을 지니고 있습니다. 지구의 존망이 걸린 이 영역에서
    생산하는 그린 전력 한 킬로와트 한 킬로와트가 기후변화의 시계를 늦춥니다

  estimated_hours: 50
  skill_focus:
    - renewable_energy
    - energy_storage
    - smart_grid
    - carbon_management

world_setting:
  name: "지속 가능 에너지 타워"
  description: |
    지속 가능 에너지 타워가 해안가에 우뚝 서 있으며, 탑 위의 풍력 터빈과
    태양광 패널이 도시 전체에 전력을 공급합니다. 그린 에너지 엔지니어들은
    이곳에서 재생에너지를 안정적이고 효율적이며 신뢰할 수 있도록 만드는
    방법을 배웁니다. 2050 탄소중립 목표는 바로 여기에서 시작됩니다

  atmosphere: "eco_futuristic"
  visual_theme: "energy_tower"

starting_scenario:
  title: "첫 번째 그린 전력"
  description: |
    에너지 장로 Volt가 현재의 에너지 현황과 전환 과제를 안내합니다
    그런데 갑작스러운 「전력 폭풍」Blackout이 전력망의 안정을 위협하고 있습니다
    도시 전체가 암흑에 빠지지 않도록 수요와 공급의 균형을 이해해야 합니다

  initial_tasks:
    - learn_energy_basics
    - understand_renewables
    - first_solar_design

skill_tree:
  core_skills:
    - id: solar_energy
      name: "태양광 공학"
      description: "태양광 발전 시스템 설계 및 최적화"
      max_level: 10
      unlocks:
        - pv_system_design
        - solar_forecasting

    - id: wind_energy
      name: "풍력 발전"
      description: "터빈 설계, 부지 선정, 운영 및 유지보수 이해"
      max_level: 10
      unlocks:
        - turbine_aerodynamics
        - offshore_wind

    - id: energy_storage
      name: "에너지 저장 기술"
      description: "리튬 배터리, 플로우 배터리, 수소 저장 마스터하기"
      max_level: 10
      unlocks:
        - battery_management
        - hydrogen_systems

    - id: smart_grid
      name: "스마트 그리드"
      description: "AI로 전력 수급·배전·거래 관리하기"
      max_level: 10
      unlocks:
        - demand_response
        - grid_optimization

  advanced_skills:
    - id: carbon_engineering
      name: "탄소 관리 공학"
      description: "탄소 포집, 탄소 거래, 기업 탄소 인벤토리"
      max_level: 15
      requires: [solar_energy, wind_energy]

    - id: microgrid_design
      name: "마이크로그리드 설계"
      description: "독립형 또는 커뮤니티 규모의 독립 전력 시스템 설계"
      max_level: 15
      requires: [energy_storage, smart_grid]

    - id: green_hydrogen
      name: "그린 수소 기술"
      description: "재생에너지를 이용한 수전해 수소 생산 완전 시스템"
      max_level: 15
      requires: [energy_storage, carbon_engineering]

milestone_quests:
  - id: first_kilowatt
    name: "첫 번째 킬로와트"
    description: "1kW를 발전할 수 있는 태양광 시스템을 설계하고 시뮬레이션하기"
    required_level: 5
    skills_tested: [solar_energy, smart_grid]
    xp_reward: 500
    unlocks:
      - solar_badge
      - field_access

  - id: blackout_preventer
    name: "블랙아웃 종결자"
    description: "에너지 저장과 수요 반응을 이용해 전력망 붕괴를 막아라"
    required_level: 10
    skills_tested: [energy_storage, smart_grid]
    xp_reward: 1000
    unlocks:
      - grid_master_title
      - control_room_access

  - id: net_zero_architect
    name: "넷제로 설계자"
    description: "탄소 순배출 제로를 달성하는 스마트 커뮤니티 설계하기"
    required_level: 20
    skills_tested: [microgrid_design, carbon_engineering]
    xp_reward: 2500
    unlocks:
      - net_zero_legend_title
      - tower_leadership

achievements:
  - id: first_panel
    name: "첫 번째 패널"
    description: "태양광 패널 설치 설계 완료하기"
    xp_reward: 100
    badge_type: bronze

  - id: wind_rider
    name: "바람의 기수"
    description: "해상 풍력 단지의 발전 효율을 95%로 최적화하기"
    xp_reward: 250
    badge_type: silver

  - id: grid_balancer
    name: "그리드 밸런서 마스터"
    description: "30일 연속으로 전력망 수급 편차 제로 유지하기"
    xp_reward: 500
    badge_type: gold

  - id: energy_legend
    name: "에너지 레전드"
    description: "모든 그린 에너지 공학 도전 완료하기"
    xp_reward: 1000
    badge_type: platinum

example_tasks:
  beginner:
    - id: solar_calculator
      type: analysis
      title: "태양광 발전량 계산"
      description: "지역별 일조 데이터를 이용해 연간 발전량 추정하기"
      skills_improved: [solar_energy]
      xp_reward: 60

    - id: energy_audit
      type: analysis
      title: "가정 에너지 감사"
      description: "가정의 전력 소비 패턴을 분석하고 에너지 절약 방안 제안하기"
      skills_improved: [smart_grid]
      xp_reward: 50

  intermediate:
    - id: hybrid_system
      type: creation
      title: "태양광·풍력 하이브리드 시스템"
      description: "태양광과 풍력을 결합한 하이브리드 발전 시스템 설계하기"
      skills_improved: [solar_energy, wind_energy]
      xp_reward: 180

    - id: battery_sizing
      type: creation
      title: "에너지 저장 시스템 설계"
      description: "학교를 위한 최적화된 에너지 저장 구성 설계하기"
      skills_improved: [energy_storage, smart_grid]
      xp_reward: 200

  advanced:
    - id: smart_community
      type: creation
      title: "스마트 커뮤니티 그리드"
      description: "태양광, 저장장치, 전기차 충전이 포함된 커뮤니티 마이크로그리드 설계하기"
      skills_improved: [microgrid_design, smart_grid]
      xp_reward: 350

    - id: carbon_neutral
      type: creation
      title: "기업 탄소 중립 방안"
      description: "제조업 기업을 위한 탄소 중립 경로 기획하기"
      skills_improved: [carbon_engineering, green_hydrogen]
      xp_reward: 400

learning_objectives:
  - "태양광 및 풍력 발전의 원리와 설계 이해하기"
  - "에너지 저장 기술 선정과 시스템 설계 마스터하기"
  - "AI를 활용한 스마트 그리드 배전 최적화"
  - "수요 반응과 전력 거래 실행하기"
  - "탄소 인벤토리, 탄소 거래, 탄소 포집 이해하기"
  - "커뮤니티 규모의 마이크로그리드 시스템 설계하기"
  - "그린 수소 기술의 가능성과 도전 탐색하기"
  - "에너지 전환 정책과 2050 탄소중립 목표 이해하기"

career_outcomes:
  - "재생에너지 엔지니어"
  - "에너지 저장 시스템 엔지니어"
  - "스마트 그리드 엔지니어"
  - "탄소 관리 컨설턴트"
  - "ESG 애널리스트"
  - "에너지 정책 연구원"
  - "마이크로그리드 설계자"
  - "그린 수소 기술 엔지니어"
