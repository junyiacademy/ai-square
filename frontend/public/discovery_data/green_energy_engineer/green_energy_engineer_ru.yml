# Green Energy Engineer Discovery Path - Russian
path_id: green_energy_engineer
category: science
difficulty_range: beginner_to_expert

metadata:
  title: "Страж Зелёной Энергии - Стратегический Консультант Зелёной Энергетики"
  short_description: "Используй силу солнца, ветра и природы для устойчивого будущего"
  long_description: |
    Ты — начинающий инженер в «Башне Устойчивой Энергии», где силы природы улавливаются и превращаются в чистое электричество. В этой высокотехнологичной башне ты узнаешь, как солнечный свет превращается в энергию, как ветер вращает турбины и как водородные топливные элементы хранят энергию на завтра. Пока изменение климата угрожает миру, твои инновации могут помочь его спасти.

  estimated_hours: 52
  skill_focus:
    - solar_power
    - wind_energy
    - energy_storage
    - smart_grid

world_setting:
  name: "Башня Устойчивой Энергии"
  description: |
    Башня Устойчивой Энергии — это чудо зелёной инженерии, возвышающееся над ландшафтом, питаемым исключительно возобновляемыми источниками. Инженеры здесь используют солнечные панели, ветряные турбины и водородные системы для обеспечения чистой энергией целых городов. Каждый прорыв здесь сокращает выбросы углерода и защищает планету.

  atmosphere: "hopeful_innovation"
  visual_theme: "green_tech_tower"

starting_scenario:
  title: "Сигнал Энергетического Кризиса"
  description: |
    Главный инженер Аврора бьёт тревогу: электросеть города разрушается из-за чрезмерной зависимости от ископаемого топлива. Необходимо разработать новую систему возобновляемой энергии для замены устаревших угольных электростанций. Путешествие начинается с понимания того, как солнечный свет и ветер могут питать целый город — чисто и эффективно.

  initial_tasks:
    - learn_solar_basics
    - study_wind_power
    - calculate_energy_needs

skill_tree:
  core_skills:
    - id: solar_power
      name: "Системы Солнечной Энергии"
      description: "Освой, как солнечные панели преобразуют солнечный свет в чистое электричество"
      max_level: 10
      unlocks:
        - panel_optimization
        - solar_farm_design

    - id: wind_energy
      name: "Системы Ветровой Энергии"
      description: "Узнай, как ветряные турбины генерируют энергию из движущегося воздуха"
      max_level: 10
      unlocks:
        - turbine_placement
        - offshore_wind

    - id: energy_storage
      name: "Хранение Энергии"
      description: "Реши задачу хранения возобновляемой энергии, когда солнце и ветер недоступны"
      max_level: 10
      unlocks:
        - battery_systems
        - hydrogen_fuel_cells

    - id: smart_grid
      name: "Управление Умной Сетью"
      description: "Балансируй спрос и предложение энергии в городе с помощью интеллектуальных систем"
      max_level: 10
      unlocks:
        - grid_automation
        - demand_forecasting

  advanced_skills:
    - id: hydrogen_tech
      name: "Водородные Технологии"
      description: "Проектируй системы производства водорода и топливных элементов для хранения чистой энергии"
      max_level: 15
      requires: [solar_power, energy_storage]

    - id: offshore_systems
      name: "Офшорные Энергосистемы"
      description: "Строй ветровые и волновые энергосистемы в океанических условиях"
      max_level: 15
      requires: [wind_energy, smart_grid]

    - id: carbon_reduction
      name: "Планирование Сокращения Углерода"
      description: "Разрабатывай комплексные планы минимизации углеродного следа городов и промышленности"
      max_level: 15
      requires: [smart_grid, solar_power]

milestone_quests:
  - id: first_panel
    name: "Первая Солнечная Установка"
    description: "Разработай и рассчитай систему солнечных панелей для школьного здания"
    required_level: 5
    skills_tested: [solar_power, energy_storage]
    xp_reward: 500
    unlocks:
      - solar_champion_badge
      - advanced_lab_access

  - id: wind_farm
    name: "Проектировщик Ветропарка"
    description: "Спланируй ветропарк для максимизации выработки энергии в прибрежном регионе"
    required_level: 10
    skills_tested: [wind_energy, smart_grid]
    xp_reward: 1000
    unlocks:
      - wind_master_title
      - coastal_project_access

  - id: green_city
    name: "Архитектор Зелёного Города"
    description: "Разработай полную систему возобновляемой энергии для целого городского района"
    required_level: 20
    skills_tested: [hydrogen_tech, carbon_reduction]
    xp_reward: 2500
    unlocks:
      - green_city_architect_title
      - tower_leadership

achievements:
  - id: first_watt
    name: "Первый Ватт"
    description: "Сгенерируй свой первый киловатт симулированной возобновляемой энергии"
    xp_reward: 100
    badge_type: bronze

  - id: carbon_saver
    name: "Поглотитель Углерода"
    description: "Разработай систему, которая устраняет 100 тонн выбросов CO2"
    xp_reward: 250
    badge_type: silver

  - id: grid_balancer
    name: "Балансировщик Сети"
    description: "Успешно сбалансируй спрос и предложение энергии в течение 24 часов"
    xp_reward: 500
    badge_type: gold

  - id: green_legend
    name: "Легенда Зелёной Энергии"
    description: "Выполни все задания по возобновляемой энергии в Башне"
    xp_reward: 1000
    badge_type: platinum

example_tasks:
  beginner:
    - id: solar_calc
      type: analysis
      title: "Калькулятор Солнечных Панелей"
      description: "Рассчитай, сколько солнечных панелей нужно дому для энергетической независимости"
      skills_improved: [solar_power]
      xp_reward: 60

    - id: wind_basics
      type: analysis
      title: "Основы Ветровой Энергии"
      description: "Проанализируй данные о скорости ветра, чтобы найти лучшее место для ветряной турбины"
      skills_improved: [wind_energy]
      xp_reward: 50

  intermediate:
    - id: battery_design
      type: design
      title: "Система Аккумуляторного Хранения"
      description: "Разработай систему аккумуляторов для хранения солнечной энергии для ночного использования"
      skills_improved: [energy_storage, solar_power]
      xp_reward: 180

    - id: grid_sim
      type: simulation
      title: "Симуляция Умной Сети"
      description: "Смоделируй, как умная сеть балансирует возобновляемую энергию в районе"
      skills_improved: [smart_grid, energy_storage]
      xp_reward: 200

  advanced:
    - id: hydrogen_plant
      type: creation
      title: "Водородная Электростанция"
      description: "Спроектируй установку по производству зелёного водорода из избыточной солнечной энергии"
      skills_improved: [hydrogen_tech, solar_power]
      xp_reward: 350

    - id: zero_carbon
      type: creation
      title: "План Города с Нулевыми Выбросами"
      description: "Создай комплексный углеродно-нейтральный энергетический план для среднего города"
      skills_improved: [carbon_reduction, smart_grid]
      xp_reward: 400

learning_objectives:
  - "Понять, как солнечные панели преобразуют солнечный свет в электричество"
  - "Узнать, как ветряные турбины генерируют чистую энергию из движущегося воздуха"
  - "Освоить технологии хранения энергии, включая аккумуляторы и водород"
  - "Проектировать системы умной сети для балансировки спроса и предложения"
  - "Рассчитывать потребности в энергии и проектировать соответствующие возобновляемые системы"
  - "Понять влияние возобновляемой энергии на сокращение выбросов углерода"
  - "Исследовать технологию водородных топливных элементов как решение для хранения энергии"
  - "Развить навыки планирования городских переходов на устойчивую энергетику"

career_outcomes:
  - "Стратегический Консультант Зелёной Энергетики"
  - "Проектировщик Солнечных Систем"
  - "Специалист по Ветровой Энергии"
  - "Инженер по Хранению Энергии"
  - "Инженер Умных Сетей"
  - "Инженер Водородных Систем"
  - "Консультант по Устойчивому Развитию"
  - "Планировщик Сокращения Выбросов"
