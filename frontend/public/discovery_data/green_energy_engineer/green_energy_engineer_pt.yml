# Green Energy Engineer Discovery Path - Portuguese
path_id: green_energy_engineer
category: science
difficulty_range: beginner_to_expert

metadata:
  title: "Guardião da Energia Verde - Consultor de Estratégia de Energia Verde"
  short_description: "Aproveita o poder do sol, vento e natureza para um futuro sustentável"
  long_description: |
    És um engenheiro novato na "Torre de Energia Sustentável", onde as forças da natureza são capturadas e transformadas em eletricidade limpa. Nesta torre de alta tecnologia, vais descobrir como a luz solar se torna energia, como o vento faz girar as turbinas, e como as células de combustível de hidrogénio armazenam energia para amanhã. Com as alterações climáticas ameaçando o mundo, as tuas inovações podem ajudar a salvá-lo.

  estimated_hours: 52
  skill_focus:
    - solar_power
    - wind_energy
    - energy_storage
    - smart_grid

world_setting:
  name: "Torre de Energia Sustentável"
  description: |
    A Torre de Energia Sustentável é uma maravilha da engenharia verde que se eleva sobre uma paisagem alimentada inteiramente por fontes renováveis. Os engenheiros aqui aproveitam painéis solares, turbinas eólicas e sistemas de hidrogénio para fornecer energia limpa a cidades inteiras. Cada avanço aqui reduz as emissões de carbono e protege o planeta.

  atmosphere: "hopeful_innovation"
  visual_theme: "green_tech_tower"

starting_scenario:
  title: "O Alarme da Crise Energética"
  description: |
    A Engenheira Chefe Aurora soa o alarme: a rede elétrica da cidade está a falhar devido à dependência excessiva de combustíveis fósseis. Tens de desenhar um novo sistema de energia renovável para substituir as antigas centrais a carvão. A tua jornada começa com perceber como a luz solar e o vento podem alimentar uma cidade inteira — de forma limpa e eficiente.

  initial_tasks:
    - learn_solar_basics
    - study_wind_power
    - calculate_energy_needs

skill_tree:
  core_skills:
    - id: solar_power
      name: "Sistemas de Energia Solar"
      description: "Domina como os painéis solares convertem a luz solar em eletricidade limpa"
      max_level: 10
      unlocks:
        - panel_optimization
        - solar_farm_design

    - id: wind_energy
      name: "Sistemas de Energia Eólica"
      description: "Aprende como as turbinas eólicas geram energia a partir do ar em movimento"
      max_level: 10
      unlocks:
        - turbine_placement
        - offshore_wind

    - id: energy_storage
      name: "Armazenamento de Energia"
      description: "Resolve o problema de armazenar energia renovável quando o sol e o vento não estão disponíveis"
      max_level: 10
      unlocks:
        - battery_systems
        - hydrogen_fuel_cells

    - id: smart_grid
      name: "Gestão de Rede Inteligente"
      description: "Equilibra a oferta e procura de energia numa cidade usando sistemas inteligentes"
      max_level: 10
      unlocks:
        - grid_automation
        - demand_forecasting

  advanced_skills:
    - id: hydrogen_tech
      name: "Tecnologia do Hidrogénio"
      description: "Projeta sistemas de produção de hidrogénio e células de combustível para armazenamento de energia limpa"
      max_level: 15
      requires: [solar_power, energy_storage]

    - id: offshore_systems
      name: "Sistemas de Energia Offshore"
      description: "Constrói sistemas de energia eólica e de ondas em ambientes oceânicos"
      max_level: 15
      requires: [wind_energy, smart_grid]

    - id: carbon_reduction
      name: "Planeamento de Redução de Carbono"
      description: "Projeta planos abrangentes para minimizar a pegada de carbono de cidades e indústrias"
      max_level: 15
      requires: [smart_grid, solar_power]

milestone_quests:
  - id: first_panel
    name: "Primeiro Painel Solar"
    description: "Projeta e calcula um sistema de painéis solares que alimenta um edifício escolar"
    required_level: 5
    skills_tested: [solar_power, energy_storage]
    xp_reward: 500
    unlocks:
      - solar_champion_badge
      - advanced_lab_access

  - id: wind_farm
    name: "Designer de Parque Eólico"
    description: "Planeia um parque eólico que maximiza a produção de energia para uma região costeira"
    required_level: 10
    skills_tested: [wind_energy, smart_grid]
    xp_reward: 1000
    unlocks:
      - wind_master_title
      - coastal_project_access

  - id: green_city
    name: "Arquiteto de Cidade Verde"
    description: "Projeta um sistema completo de energia renovável para um bairro urbano inteiro"
    required_level: 20
    skills_tested: [hydrogen_tech, carbon_reduction]
    xp_reward: 2500
    unlocks:
      - green_city_architect_title
      - tower_leadership

achievements:
  - id: first_watt
    name: "Primeiro Watt"
    description: "Gera o teu primeiro quilowatt de energia renovável simulada"
    xp_reward: 100
    badge_type: bronze

  - id: carbon_saver
    name: "Poupador de Carbono"
    description: "Projeta um sistema que elimina 100 toneladas de emissões de CO2"
    xp_reward: 250
    badge_type: silver

  - id: grid_balancer
    name: "Equilibrador de Rede"
    description: "Equilibra com sucesso a oferta e procura de energia durante 24 horas"
    xp_reward: 500
    badge_type: gold

  - id: green_legend
    name: "Lenda da Energia Verde"
    description: "Completa todos os desafios de energia renovável na Torre"
    xp_reward: 1000
    badge_type: platinum

example_tasks:
  beginner:
    - id: solar_calc
      type: analysis
      title: "Calculadora de Painéis Solares"
      description: "Calcula quantos painéis solares uma casa precisa para ser energeticamente independente"
      skills_improved: [solar_power]
      xp_reward: 60

    - id: wind_basics
      type: analysis
      title: "Fundamentos da Energia Eólica"
      description: "Analisa dados de velocidade do vento para encontrar o melhor local para uma turbina eólica"
      skills_improved: [wind_energy]
      xp_reward: 50

  intermediate:
    - id: battery_design
      type: design
      title: "Sistema de Armazenamento de Baterias"
      description: "Projeta um sistema de baterias que armazena energia solar para uso noturno"
      skills_improved: [energy_storage, solar_power]
      xp_reward: 180

    - id: grid_sim
      type: simulation
      title: "Simulação de Rede Inteligente"
      description: "Simula como uma rede inteligente equilibra a energia renovável num bairro"
      skills_improved: [smart_grid, energy_storage]
      xp_reward: 200

  advanced:
    - id: hydrogen_plant
      type: creation
      title: "Central de Hidrogénio"
      description: "Projeta uma instalação de produção de hidrogénio verde usando excesso de energia solar"
      skills_improved: [hydrogen_tech, solar_power]
      xp_reward: 350

    - id: zero_carbon
      type: creation
      title: "Plano de Cidade Zero Carbono"
      description: "Cria um plano energético neutro em carbono abrangente para uma cidade de tamanho médio"
      skills_improved: [carbon_reduction, smart_grid]
      xp_reward: 400

learning_objectives:
  - "Perceber como os painéis solares convertem a luz solar em eletricidade"
  - "Aprender como as turbinas eólicas geram energia limpa a partir do ar em movimento"
  - "Dominar tecnologias de armazenamento de energia incluindo baterias e hidrogénio"
  - "Projetar sistemas de rede inteligente que equilibram oferta e procura"
  - "Calcular necessidades energéticas e projetar sistemas renováveis de tamanho adequado"
  - "Compreender o impacto da energia renovável na redução de emissões de carbono"
  - "Explorar a tecnologia de células de combustível de hidrogénio como solução de armazenamento"
  - "Desenvolver competências para planear transições energéticas sustentáveis nas cidades"

career_outcomes:
  - "Consultor de Estratégia de Energia Verde"
  - "Designer de Sistemas Solares"
  - "Especialista em Energia Eólica"
  - "Engenheiro de Armazenamento de Energia"
  - "Engenheiro de Rede Inteligente"
  - "Engenheiro de Sistemas de Hidrogénio"
  - "Consultor de Sustentabilidade"
  - "Planeador de Redução de Carbono"
