# 绿能工程师探索路径 - 简体中文
path_id: green_energy_engineer
category: sustainability
difficulty_range: beginner_to_expert

metadata:
  title: "能源守护者 - 绿能工程师"
  short_description: "用可再生能源和智慧电网守护地球的未来"
  long_description: |
    你是「永续能源塔」的见习守护者，拥有驾驭风、光、水的天赋
    在这个攸关地球存亡的领域中，每一度绿电的产生
    都在对抗气候变迁的时钟上争取更多时间

  estimated_hours: 50
  skill_focus:
    - renewable_energy
    - energy_storage
    - smart_grid
    - carbon_management

world_setting:
  name: "永续能源塔"
  description: |
    永续能源塔矗立在海岸边，塔顶的风机和太阳能板为整座城市供电
    绿能工程师在此学习如何让可再生能源稳定、高效、可靠
    2050 净零碳排的目标就从这里开始实现

  atmosphere: "eco_futuristic"
  visual_theme: "energy_tower"

starting_scenario:
  title: "第一度绿电"
  description: |
    能源长老 Volt 带你了解当前的能源现状和转型挑战
    但一场突如其来的「电力风暴」Blackout 正在威胁电网稳定
    你必须理解供需平衡才能拯救整座城市不陷入黑暗

  initial_tasks:
    - learn_energy_basics
    - understand_renewables
    - first_solar_design

skill_tree:
  core_skills:
    - id: solar_energy
      name: "太阳能工程"
      description: "设计和优化太阳能发电系统"
      max_level: 10
      unlocks:
        - pv_system_design
        - solar_forecasting

    - id: wind_energy
      name: "风力发电"
      description: "理解风机设计、选址和维运"
      max_level: 10
      unlocks:
        - turbine_aerodynamics
        - offshore_wind

    - id: energy_storage
      name: "储能技术"
      description: "掌握锂电池、液流电池、氢能储存"
      max_level: 10
      unlocks:
        - battery_management
        - hydrogen_systems

    - id: smart_grid
      name: "智慧电网"
      description: "用 AI 管理电力供需、调度和交易"
      max_level: 10
      unlocks:
        - demand_response
        - grid_optimization

  advanced_skills:
    - id: carbon_engineering
      name: "碳管理工程"
      description: "碳捕捉、碳交易、企业碳盘查"
      max_level: 15
      requires: [solar_energy, wind_energy]

    - id: microgrid_design
      name: "微电网设计"
      description: "设计离网或社区级的独立电力系统"
      max_level: 15
      requires: [energy_storage, smart_grid]

    - id: green_hydrogen
      name: "绿氢技术"
      description: "用可再生能源电解水产氢的完整系统"
      max_level: 15
      requires: [energy_storage, carbon_engineering]

milestone_quests:
  - id: first_kilowatt
    name: "第一千瓦"
    description: "设计并模拟一套能发出 1kW 的太阳能系统"
    required_level: 5
    skills_tested: [solar_energy, smart_grid]
    xp_reward: 500
    unlocks:
      - solar_badge
      - field_access

  - id: blackout_preventer
    name: "黑暗终结者"
    description: "用储能和需量反应阻止一次电网崩溃"
    required_level: 10
    skills_tested: [energy_storage, smart_grid]
    xp_reward: 1000
    unlocks:
      - grid_master_title
      - control_room_access

  - id: net_zero_architect
    name: "净零建筑师"
    description: "设计一座达成净零碳排的智慧社区"
    required_level: 20
    skills_tested: [microgrid_design, carbon_engineering]
    xp_reward: 2500
    unlocks:
      - net_zero_legend_title
      - tower_leadership

achievements:
  - id: first_panel
    name: "第一片面板"
    description: "完成太阳能面板的安装设计"
    xp_reward: 100
    badge_type: bronze

  - id: wind_rider
    name: "驭风者"
    description: "优化离岸风场的发电效率达 95%"
    xp_reward: 250
    badge_type: silver

  - id: grid_balancer
    name: "电网平衡大师"
    description: "连续 30 天维持电网供需零偏差"
    xp_reward: 500
    badge_type: gold

  - id: energy_legend
    name: "能源传奇"
    description: "完成所有绿能工程挑战"
    xp_reward: 1000
    badge_type: platinum

example_tasks:
  beginner:
    - id: solar_calculator
      type: analysis
      title: "太阳能发电量计算"
      description: "根据各地日照资料估算年发电量"
      skills_improved: [solar_energy]
      xp_reward: 60

    - id: energy_audit
      type: analysis
      title: "家庭能源审计"
      description: "分析一个家庭的用电模式并提出节能建议"
      skills_improved: [smart_grid]
      xp_reward: 50

  intermediate:
    - id: hybrid_system
      type: creation
      title: "风光互补系统"
      description: "设计太阳能 + 风力的混合发电系统"
      skills_improved: [solar_energy, wind_energy]
      xp_reward: 180

    - id: battery_sizing
      type: creation
      title: "储能系统设计"
      description: "为一座学校设计最优化的储能配置"
      skills_improved: [energy_storage, smart_grid]
      xp_reward: 200

  advanced:
    - id: smart_community
      type: creation
      title: "智慧社区电网"
      description: "设计含太阳能、储能、电动车充电的社区微电网"
      skills_improved: [microgrid_design, smart_grid]
      xp_reward: 350

    - id: carbon_neutral
      type: creation
      title: "企业碳中和方案"
      description: "为一家制造业公司规划碳中和路径"
      skills_improved: [carbon_engineering, green_hydrogen]
      xp_reward: 400

learning_objectives:
  - "理解太阳能和风力发电的原理与设计"
  - "掌握储能技术的选型与系统设计"
  - "运用 AI 优化智慧电网调度"
  - "实作需量反应与电力交易"
  - "理解碳盘查、碳交易与碳捕捉"
  - "设计社区级微电网系统"
  - "探索绿氢技术的潜力与挑战"
  - "了解能源转型政策与 2050 净零目标"

career_outcomes:
  - "可再生能源工程师"
  - "储能系统工程师"
  - "智慧电网工程师"
  - "碳管理顾问"
  - "ESG 分析师"
  - "能源政策研究员"
  - "微电网设计师"
  - "绿氢技术工程师"
