# Tech Entrepreneur Discovery Path - English
path_id: tech_entrepreneur
category: technology
difficulty_range: beginner_to_expert

metadata:
  title: "Deep Tech Builder - Tech Entrepreneur"
  short_description: "Build technology ventures that solve hard problems"
  long_description: |
    You are a new member of the "Tech Venture Lab," possessing the ability to
    identify deep technology opportunities and build ventures around them. Each
    industry has unique technological maturity levels, and you must adapt to
    various markets to build successful technology companies.

  estimated_hours: 65
  skill_focus:
    - tech_trend_analysis
    - technology_integration
    - team_building
    - business_model_design

world_setting:
  name: "Tech Venture Lab"
  description: |
    The Tech Venture Lab is a global network of innovation hubs connecting
    entrepreneurs across industries. Tech entrepreneurs work across sectors, bringing
    innovations from one industry to solve problems in another, while competing against
    incumbent players that seek to dominate their markets.

  atmosphere: "futuristic_dynamic"
  visual_theme: "innovation_hub"

starting_scenario:
  title: "The First Venture"
  description: |
    James greets you at the innovation hub, explaining the landscape of deep tech
    entrepreneurship. But a dominant corporation is using aggressive tactics to crush
    startups across the industry. You must use innovation and collaboration to
    compete and carve out your market position.

  initial_tasks:
    - understand_industry
    - identify_opportunity
    - assemble_team

skill_tree:
  core_skills:
    - id: opportunity_sensing
      name: "Tech Trend Analysis"
      description: "Detect business opportunities across industries"
      max_level: 10
      unlocks:
        - market_gaps
        - trend_prediction

    - id: tech_fusion
      name: "Technology Integration"
      description: "Combine technologies from different domains"
      max_level: 10
      unlocks:
        - innovation_synthesis
        - cross_platform_tech

    - id: venture_building
      name: "Business Model Design"
      description: "Build scalable tech businesses"
      max_level: 10
      unlocks:
        - business_models
        - growth_hacking

    - id: dimensional_networking
      name: "Industry Network"
      description: "Build networks across industries"
      max_level: 10
      unlocks:
        - investor_relations
        - talent_acquisition

  advanced_skills:
    - id: disruption_mastery
      name: "Disruption Engineering"
      description: "Create industry-changing innovations"
      max_level: 15
      requires: [opportunity_sensing, tech_fusion]

    - id: unicorn_creation
      name: "Unicorn Building"
      description: "Build billion-dollar tech companies"
      max_level: 15
      requires: [venture_building, dimensional_networking]

    - id: ecosystem_architecture
      name: "Ecosystem Building"
      description: "Create thriving tech ecosystems"
      max_level: 15
      requires: [dimensional_networking, tech_fusion]

milestone_quests:
  - id: first_startup
    name: "Venture Launch"
    description: "Launch your first deep tech startup"
    required_level: 5
    skills_tested: [opportunity_sensing, venture_building]
    xp_reward: 700
    unlocks:
      - tech_founder_badge
      - investor_interest

  - id: monopoly_breaker
    name: "Market Disruptor"
    description: "Disrupt an incumbent's market dominance"
    required_level: 10
    skills_tested: [disruption_mastery, tech_fusion]
    xp_reward: 1500
    unlocks:
      - disruptor_title
      - industry_recognition

  - id: multiverse_empire
    name: "Tech Portfolio"
    description: "Build successful ventures across 5 industries"
    required_level: 20
    skills_tested: [unicorn_creation, ecosystem_architecture]
    xp_reward: 3500
    unlocks:
      - serial_entrepreneur_title
      - ecosystem_leadership

achievements:
  - id: first_funding
    name: "Seed Round"
    description: "Raise your first investment"
    xp_reward: 150
    badge_type: bronze

  - id: tech_innovator
    name: "Innovation Catalyst"
    description: "Create 5 breakthrough technologies"
    xp_reward: 400
    badge_type: silver

  - id: exit_success
    name: "Successful Exit"
    description: "Successfully exit a startup"
    xp_reward: 800
    badge_type: gold

  - id: serial_legend
    name: "Serial Entrepreneur"
    description: "Complete all entrepreneurial challenges"
    xp_reward: 1500
    badge_type: platinum

example_tasks:
  beginner:
    - id: market_validation
      type: analysis
      title: "Market Opportunity Scan"
      description: "Validate a business idea across target markets"
      skills_improved: [opportunity_sensing, tech_trend_analysis]
      xp_reward: 80

    - id: mvp_launch
      type: creation
      title: "MVP Prototype"
      description: "Build and launch an MVP"
      skills_improved: [venture_building, tech_fusion]
      xp_reward: 90

  intermediate:
    - id: team_assembly
      type: chat
      title: "Founding Team Assembly"
      description: "Recruit talent from different domains"
      skills_improved: [dimensional_networking, team_building]
      xp_reward: 200

    - id: product_scaling
      type: creation
      title: "Product Scaling"
      description: "Scale product across multiple markets"
      skills_improved: [growth_hacking, venture_building]
      xp_reward: 250

  advanced:
    - id: industry_disruption
      type: creation
      title: "Industry Disruptor"
      description: "Create technology that changes an industry"
      skills_improved: [disruption_mastery, business_model_design]
      xp_reward: 450

    - id: ecosystem_creation
      type: creation
      title: "Innovation Ecosystem"
      description: "Build a thriving tech ecosystem"
      skills_improved: [ecosystem_architecture, dimensional_networking]
      xp_reward: 500

learning_objectives:
  - "Identify opportunities across different markets and industries"
  - "Build and scale technology companies from idea to exit"
  - "Master fundraising and investor relations"
  - "Create innovative products that solve real problems"
  - "Build and lead high-performing distributed teams"
  - "Navigate regulatory and cultural differences"
  - "Develop sustainable competitive advantages"
  - "Foster innovation ecosystems"

career_outcomes:
  - "Tech Startup Founder"
  - "Serial Entrepreneur"
  - "Venture Partner"
  - "Innovation Director"
  - "Startup Ecosystem Builder"
  - "Technology Strategist"
  - "Corporate Innovation Lead"
  - "Angel Investor"
