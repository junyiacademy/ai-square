# YouTuber 探索路徑 - 繁體中文
path_id: youtuber
category: arts
difficulty_range: beginner_to_expert

metadata:
  title: "影音創作者 - YouTuber"
  short_description: "用影片和直播打造自己的頻道——拍攝、剪輯、縮圖、直播全都來"
  long_description: |
    你是「CreatorHub 創作者基地」的新進創作者，擁有透過鏡頭說故事、娛樂觀眾的天賦。
    在這個充滿創意與技術的內容創作空間中，每一支影片都是一次表達機會，每一個訂閱者
    都是你的觀眾，而你的使命就是創造出能夠感動人心、引起共鳴的影像內容。

  estimated_hours: 55
  skill_focus:
    - storytelling_arts
    - video_production
    - audience_resonance
    - algorithm_studies

world_setting:
  name: "CreatorHub 創作者基地"
  description: |
    CreatorHub 創作者基地是一個支持頂尖內容創作者的專業孵化空間。在這裡，創作者學習
    平衡創意與演算法需求、真實性與觀眾期待，建立能啟發和娛樂數百萬人的頻道。

  atmosphere: "creative_dynamic"
  visual_theme: "digital_stage"

starting_scenario:
  title: "演算法變遷"
  description: |
    你是「CreatorHub 創作者基地」的新進創作者，頻道剛起步，第一批影片才剛上線。
    百萬訂閱 YouTuber Danny（曾任三立電視導播，專攻知識型內容）把你叫進剪輯室說：「演算法剛做了一次大更新，連台灣幾位百萬訂閱 YouTuber 的頻道流量都暴跌——你要在這個時間點起步，你的策略是什麼？全球創作者經濟規模已突破千億美金，MrBeast 模式證明優質內容可以跨越語言和文化。」

    【你的任務】分析這次演算法變遷對不同類型內容的影響，說明你會如何在保持創作初心的同時，讓你的內容被更多人看見。
    你需要思考：什麼樣的內容有長久的生命力？如何在真實性和演算法友好之間取得平衡？

    【成功標準】提出你的頻道定位和內容策略，說明你的目標觀眾是誰、你能提供什麼獨特價值，以及你打算如何持續成長。
  initial_tasks:
    - understand_youtube
    - learn_video_basics
    - create_first_video

skill_tree:
  core_skills:
    - id: content_planning
      name: "腳本企劃"
      description: "規劃引人入勝的影片內容——就像導演拿到劇本，先想好要拍什麼、怎麼拍"
      max_level: 10
      unlocks:
        - series_planning
        - content_calendar

    - id: video_production
      name: "攝影技術"
      description: "精通影片拍攝技巧——鏡頭語言、構圖、打光，用畫面說故事"
      max_level: 10
      unlocks:
        - camera_mastery
        - lighting_techniques

    - id: video_editing
      name: "後製剪輯"
      description: "剪輯引人入勝的影片——像廚師擺盤，把素材剪成觀眾捨不得跳過的節奏"
      max_level: 10
      unlocks:
        - pacing_rhythm
        - effects_mastery

    - id: audience_growth
      name: "社群建設"
      description: "增長並經營觀眾群"
      max_level: 10
      unlocks:
        - engagement_tactics
        - collaboration_networks

  advanced_skills:
    - id: algorithm_optimization
      name: "演算法經營"
      description: "掌握 YouTube 演算法——搞懂推薦機制，讓影片自己找到觀眾"
      max_level: 15
      requires: [content_planning, audience_growth]

    - id: monetization_mastery
      name: "頻道變現"
      description: "多元化收入來源——廣告分潤、會員、Super Chat、品牌合作"
      max_level: 15
      requires: [audience_growth, video_production]

    - id: brand_partnerships
      name: "品牌合作"
      description: "建立策略合作夥伴關係——讓品牌主動找上門的業配談判術"
      max_level: 15
      requires: [algorithm_optimization, audience_growth]

milestone_quests:
  - id: first_viral
    name: "病毒式首秀"
    description: "創造你的第一支病毒影片"
    required_level: 5
    skills_tested: [content_planning, video_editing]
    xp_reward: 600
    unlocks:
      - viral_creator_badge
      - algorithm_favor

  - id: algorithm_mastery
    name: "馴服演算法"
    description: "在演算法變化中保持穩定成長"
    required_level: 10
    skills_tested: [algorithm_optimization, audience_growth]
    xp_reward: 1200
    unlocks:
      - algorithm_tamer_title
      - stable_growth

  - id: channel_empire
    name: "百萬訂閱頻道"
    description: "建立擁有百萬訂閱的頻道"
    required_level: 20
    skills_tested: [brand_partnerships, monetization_mastery]
    xp_reward: 2400
    unlocks:
      - youtube_legend_title
      - creator_influence

achievements:
  - id: first_upload
    name: "首次演出"
    description: "上傳你的第一支影片"
    xp_reward: 60
    badge_type: bronze

  - id: engagement_king
    name: "觀眾最愛"
    description: "10 支影片達到 90% 喜歡率"
    xp_reward: 280
    badge_type: silver

  - id: consistency_master
    name: "穩定產出王"
    description: "連續 6 個月每週上傳"
    xp_reward: 480
    badge_type: gold

  - id: youtube_sage
    name: "頻道經營大師"
    description: "完成所有創作者挑戰"
    xp_reward: 960
    badge_type: platinum

example_tasks:
  beginner:
    - id: content_planning
      type: creation
      title: "故事腳本創作"
      description: "規劃影片內容和腳本"
      skills_improved: [content_planning, storytelling_arts]
      xp_reward: 65

    - id: basic_filming
      type: creation
      title: "首次錄製"
      description: "拍攝你的第一支影片"
      skills_improved: [video_production, video_editing]
      xp_reward: 75

  intermediate:
    - id: video_production
      type: creation
      title: "影片製作實戰"
      description: "拍攝和剪輯影片"
      skills_improved: [video_editing, audience_resonance]
      xp_reward: 185

    - id: thumbnail_design
      type: creation
      title: "縮圖設計"
      description: "設計吸引人的縮圖——決定觀眾會不會點進來的關鍵 3 秒"
      skills_improved: [visual_craft, algorithm_studies]
      xp_reward: 160

  advanced:
    - id: series_creation
      type: creation
      title: "系列企劃"
      description: "創造成功的影片系列"
      skills_improved: [series_planning, audience_growth]
      xp_reward: 360

    - id: live_streaming
      type: chat
      title: "即時演出"
      description: "主持引人入勝的直播"
      skills_improved: [community_building, monetization_mastery]
      xp_reward: 400

learning_objectives:
  - "精通影片製作技巧"
  - "發展獨特的內容風格"
  - "理解 YouTube 演算法"
  - "建立互動的社群"
  - "創造一致的內容"
  - "優化影片以便被發現"
  - "有效地將內容變現"
  - "平衡創意與策略"

career_outcomes:
  - "全職 YouTuber"
  - "內容創作者"
  - "影片製作人"
  - "創意總監"
  - "社群媒體經理"
  - "品牌合作經理"
  - "媒體公司創辦人"
  - "數位影響者"
